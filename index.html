// ═══════════════════════════════════════════════════════
//  CASTLE: Screen
// ═══════════════════════════════════════════════════════

function CastleScreen({ onBack }) {
  const [builtIds,  setBuiltIds]  = useState(() => loadBuilt());
  const [earnedIds, setEarnedIds] = useState(() => loadUnlocked());
  const [subview,   setSubview]   = useState('main'); // 'main'|'exchange'|'confirm'|'built'
  const [pending,   setPending]   = useState(null);   // piece being confirmed
  const [justBuilt, setJustBuilt] = useState(null);   // piece just constructed

  const builtSet   = new Set(builtIds);
  const builtCount = builtIds.length;
  const totalPcs   = CASTLE_PIECES.length;
  const available  = CASTLE_PIECES.filter(p => earnedIds.includes(p.cardId) && !builtSet.has(p.id));

  function doBuild(piece) {
    const next = [...builtIds, piece.id];
    setBuiltIds(next);
    localStorage.setItem(LS_CASTLE_KEY, JSON.stringify(next));
    setJustBuilt(piece);
    setPending(null);
    setSubview('built');
  }

  // ── CELEBRATION ──────────────────────────────────────
  if (subview === 'built' && justBuilt) {
    const newCount = builtIds.length;
    const showM3   = newCount === 3;
    const showM5   = newCount === 5;
    return (
      <Wrap>
        <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'20px', alignItems:'center', textAlign:'center', paddingTop:'16px' }}>
          <div style={{ fontSize:'3.2rem' }} className="anim-float">✨</div>
          <div className="card" style={{ padding:'26px 22px', width:'100%' }}>
            <p style={{ color:'#C4933A', fontSize:'.7rem', letterSpacing:'2px', margin:'0 0 10px' }}>🏰 NUEVA PIEZA CONSTRUIDA</p>
            <div style={{ fontSize:'2.6rem', marginBottom:'8px' }}>{justBuilt.icon}</div>
            <h2 className="font-magic" style={{ color:'#7B1B1B', fontSize:'1.25rem', margin:'0 0 6px' }}>{justBuilt.name}</h2>
            <p style={{ color:'#6B4A20', fontSize:'.88rem', margin:'0 0 14px', lineHeight:1.6 }}>{justBuilt.description}</p>
            <div style={{ background:'rgba(196,147,58,.1)', borderRadius:'10px', padding:'9px 13px' }}>
              <p style={{ color:'#C4933A', fontSize:'.8rem', margin:0, fontStyle:'italic' }}>
                Tu cromo activa esta pieza del castillo. ¡Sigue aprendiendo!
              </p>
            </div>
          </div>
          {(showM3 || showM5) && (
            <div className="anim-scaleIn" style={{ background:'linear-gradient(135deg,#1A1240,#242060)', border:'2px solid #9B6BE8', borderRadius:'14px', padding:'16px 18px', width:'100%', textAlign:'center' }}>
              <p style={{ color:'#C4A8F8', fontSize:'.68rem', letterSpacing:'2px', margin:'0 0 6px' }}>🌟 LOGRO ESPECIAL</p>
              <p className="font-magic" style={{ color:'#E8D8FF', fontSize:'1.05rem', margin:'0 0 4px' }}>
                {showM5 ? '¡El Gran Castillo Mágico!' : '¡Sala de los Primeros Hechizos!'}
              </p>
              <p style={{ color:'#C4A8F8', fontSize:'.83rem', margin:0 }}>
                {showM5 ? 'Has completado todas las piezas. ¡Eres una maga del castillo!' : 'Has desbloqueado un secreto del castillo.'}
              </p>
            </div>
          )}
          <button className="btn-main" onClick={() => setSubview('main')} style={{ padding:'15px', width:'100%' }}>
            🏰 Ver mi castillo
          </button>
        </div>
      </Wrap>
    );
  }

  // ── CONFIRMACIÓN ─────────────────────────────────────
  if (subview === 'confirm' && pending) {
    const card = MAGIC_CARDS.find(c => c.id === pending.cardId);
    return (
      <Wrap>
        <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'18px', paddingTop:'10px' }}>
          <BackBtn onClick={() => { setPending(null); setSubview('exchange'); }} />
          <div className="card" style={{ padding:'22px', textAlign:'center' }}>
            <p style={{ color:'#6B4A20', fontSize:'.88rem', margin:'0 0 14px', lineHeight:1.7 }}>
              Tu cromo <strong>{card?.name}</strong> activará una pieza del castillo.
            </p>
            <div style={{ fontSize:'2.4rem', margin:'6px 0 8px' }}>{pending.icon}</div>
            <h3 className="font-magic" style={{ color:'#7B1B1B', fontSize:'1.15rem', margin:'0 0 6px' }}>{pending.name}</h3>
            <p style={{ color:'#6B4A20', fontSize:'.85rem', margin:'0 0 14px', lineHeight:1.55 }}>{pending.description}</p>
            <div style={{ background:'rgba(196,147,58,.1)', borderRadius:'9px', padding:'9px 12px', fontSize:'.78rem', color:'#6B4A20', fontStyle:'italic' }}>
              El cromo sigue en tu colección, marcado como "Activa la {pending.name}".
            </div>
          </div>
          <button className="btn-main" onClick={() => doBuild(pending)} style={{ padding:'15px', fontSize:'1.05rem' }}>
            🏰 Sí, construir
          </button>
          <button className="btn-ghost" onClick={() => { setPending(null); setSubview('exchange'); }}
            style={{ width:'100%', justifyContent:'center', padding:'12px' }}>
            Ahora no
          </button>
        </div>
      </Wrap>
    );
  }

  // ── INTERCAMBIO ──────────────────────────────────────
  if (subview === 'exchange') {
    return (
      <Wrap>
        <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'16px' }}>
          <BackBtn onClick={() => setSubview('main')} />
          <div style={{ textAlign:'center' }}>
            <h2 className="font-magic" style={{ color:'#7B1B1B', fontSize:'1.2rem', margin:'0 0 4px' }}>Cambiar cromos</h2>
            <p style={{ color:'#6B4A20', fontSize:'.88rem', margin:0 }}>Elige un cromo para activar una pieza del castillo.</p>
          </div>
          {available.length === 0 ? (
            <div className="card" style={{ padding:'26px', textAlign:'center' }}>
              <div style={{ fontSize:'2.2rem', marginBottom:'10px' }}>🏰</div>
              <p className="font-magic" style={{ color:'#7B1B1B', fontSize:'.98rem', margin:'0 0 6px' }}>
                {builtCount === totalPcs ? '¡Castillo completo!' : 'No hay cromos disponibles'}
              </p>
              <p style={{ color:'#6B4A20', fontSize:'.85rem', margin:0, lineHeight:1.6 }}>
                {builtCount === totalPcs
                  ? '¡Has construido todas las piezas!'
                  : 'Completa más misiones para conseguir cromos.'}
              </p>
            </div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:'10px' }}>
              {available.map(p => {
                const card = MAGIC_CARDS.find(c => c.id === p.cardId);
                return (
                  <button key={p.id}
                    onClick={() => { setPending(p); setSubview('confirm'); }}
                    style={{ background:`linear-gradient(135deg,${p.bgColor}EE,${p.bgColor}AA)`, border:`2px solid ${p.accentColor}`, borderRadius:'14px', padding:'14px 16px', display:'flex', alignItems:'center', gap:'12px', textAlign:'left', cursor:'pointer', width:'100%' }}>
                    <div style={{ fontSize:'2rem', flexShrink:0 }}>{p.icon}</div>
                    <div style={{ flex:1 }}>
                      <p style={{ color:p.accentColor, fontSize:'.68rem', letterSpacing:'1.5px', margin:'0 0 2px', fontWeight:800 }}>ACTIVA:</p>
                      <p className="font-magic" style={{ color:'#F5E8C0', fontSize:'.95rem', margin:'0 0 1px' }}>{p.name}</p>
                      <p style={{ color:'#C0B090', fontSize:'.75rem', margin:0 }}>Con cromo: {card?.name}</p>
                    </div>
                    <span style={{ color:p.accentColor, fontSize:'1.1rem' }}>→</span>
                  </button>
                );
              })}
            </div>
          )}
        </div>
      </Wrap>
    );
  }

  // ── VISTA PRINCIPAL ───────────────────────────────────
  const milestone = builtCount >= 5
    ? { title:'¡El Gran Castillo Mágico!', msg:'Has completado todas las piezas. ¡Increíble!' }
    : builtCount >= 3
    ? { title:'¡Sala de los Primeros Hechizos!', msg:'Has desbloqueado un secreto del castillo.' }
    : null;

  return (
    <Wrap>
      <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'16px' }}>

        {/* Header */}
        <div style={{ display:'flex', alignItems:'center' }}>
          <BackBtn onClick={onBack} />
          <h2 className="font-magic" style={{ color:'#7B1B1B', fontSize:'1.2rem', margin:'0 0 0 10px', flex:1, textAlign:'center' }}>Mi Castillo Mágico</h2>
          <div style={{ width:'60px' }} />
        </div>

        {/* Progress strip */}
        <div style={{ background:'linear-gradient(135deg,#16102E,#221840)', border:'1.5px solid rgba(196,147,58,.35)', borderRadius:'14px', padding:'12px 18px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div>
            <p style={{ color:'#C4933A', fontSize:'.68rem', letterSpacing:'1.5px', margin:'0 0 1px', fontWeight:700 }}>PIEZAS CONSTRUIDAS</p>
            <p className="font-magic" style={{ color:'#F5D080', fontSize:'1.3rem', margin:0 }}>{builtCount} / {totalPcs}</p>
          </div>
          <p style={{ color:'#8A7AB0', fontSize:'.78rem', margin:0, fontStyle:'italic', textAlign:'right', lineHeight:1.55 }}>
            Tu castillo crece<br/>con cada misión.
          </p>
        </div>

        {/* Milestone */}
        {milestone && (
          <div className="anim-scaleIn" style={{ background:'linear-gradient(135deg,#1A1240,#242060)', border:'2px solid #9B6BE8', borderRadius:'14px', padding:'12px 18px', textAlign:'center' }}>
            <p style={{ color:'#C4A8F8', fontSize:'.66rem', letterSpacing:'2px', margin:'0 0 4px' }}>✨ LOGRO DESBLOQUEADO</p>
            <p className="font-magic" style={{ color:'#E8D8FF', fontSize:'1rem', margin:'0 0 3px' }}>{milestone.title}</p>
            <p style={{ color:'#C4A8F8', fontSize:'.82rem', margin:0 }}>{milestone.msg}</p>
          </div>
        )}

        {/* SVG Castle */}
        <div className="card" style={{ padding:'14px 10px' }}>
          <CastleSVG builtSet={builtSet} />
        </div>

        {/* Piece list */}
        <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
          {CASTLE_PIECES.map(p => {
            const isBuilt = builtSet.has(p.id);
            return (
              <div key={p.id} style={{
                background: isBuilt ? `linear-gradient(135deg,${p.bgColor},${p.bgColor}BB)` : 'rgba(24,18,44,.5)',
                border: `1.5px solid ${isBuilt ? p.accentColor : 'rgba(60,48,90,.4)'}`,
                borderRadius:'12px', padding:'11px 14px',
                display:'flex', alignItems:'center', gap:'11px',
                opacity: isBuilt ? 1 : 0.5,
              }}>
                <div style={{ fontSize:'1.5rem', filter: isBuilt ? 'none' : 'grayscale(1) brightness(0.4)' }}>{p.icon}</div>
                <div style={{ flex:1 }}>
                  <p className="font-magic" style={{ color: isBuilt ? p.accentColor : '#4A3870', fontSize:'.86rem', margin:'0 0 1px' }}>{p.name}</p>
                  <p style={{ color: isBuilt ? '#C0B090' : '#3A2860', fontSize:'.73rem', margin:0, fontStyle: isBuilt ? 'normal' : 'italic' }}>
                    {isBuilt ? p.description : '🔒 Sin construir todavía'}
                  </p>
                </div>
                {isBuilt && <span style={{ color:p.accentColor, fontSize:'.8rem', fontWeight:800 }}>✓</span>}
              </div>
            );
          })}
        </div>

        {/* Exchange CTA */}
        {available.length > 0 ? (
          <button className="btn-main" onClick={() => setSubview('exchange')} style={{ padding:'14px', fontSize:'1.05rem' }}>
            🔮 Cambiar cromos ({available.length} disponible{available.length > 1 ? 's' : ''})
          </button>
        ) : builtCount < totalPcs && (
          <div style={{ background:'rgba(196,147,58,.08)', border:'1px solid rgba(196,147,58,.22)', borderRadius:'12px', padding:'13px 16px', textAlign:'center' }}>
            <p style={{ color:'#6B4A20', fontSize:'.86rem', margin:0, lineHeight:1.6 }}>
              Completa más misiones para conseguir cromos y construir nuevas piezas.
            </p>
          </div>
        )}

      </div>
    </Wrap>
  );
}

// ── MESA DE POCIONES ─────────────────────────────────────────
const CAULDRON_MSGS = [
  '¡Ingrediente añadido! La poción cambia de color.',
  'El caldero burbujea suavemente. Buen paso.',
  'Ya queda poco para completar la poción.',
  '¡La poción está lista! Lo has conseguido.',
];

function PotionWorkbenchScreen({ mission, problemIndex, onContinue }) {
  const problem = mission.problems[problemIndex];
  const ings = problem.ingredientes || INGREDIENTES_INFO;
  const isLast = problemIndex + 1 >= mission.problems.length;

  const [inCauldron, setInCauldron] = useState([]);
  const [selected,   setSelected]   = useState(null);
  const [msg,        setMsg]         = useState('');
  const [showMsg,    setShowMsg]     = useState(false);
  const [cauldronPulse, setCauldronPulse] = useState(false);
  const [potionDone, setPotionDone]  = useState(false);
  const msgTimerRef = useRef(null);

  function selectIng(i) {
    if (inCauldron.includes(i)) return;
    setSelected(s => s === i ? null : i);
  }

  function throwToCauldron() {
    if (selected === null) return;
    const newList = [...inCauldron, selected];
    setInCauldron(newList);
    setSelected(null);
    setCauldronPulse(true);
    setTimeout(() => setCauldronPulse(false), 900);
    if (msgTimerRef.current) clearTimeout(msgTimerRef.current);
    setMsg(CAULDRON_MSGS[newList.length - 1] || '¡Bien!');
    setShowMsg(true);
    msgTimerRef.current = setTimeout(() => setShowMsg(false), 2200);
    if (newList.length >= ings.length) {
      setTimeout(() => setPotionDone(true), 1000);
    }
  }

  return (
    <Wrap>
      <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'16px' }}>

        {/* Header */}
        <div style={{ textAlign:'center' }}>
          <p className="font-magic" style={{ color:'#C4933A', fontSize:'.65rem', letterSpacing:'2px', margin:'0 0 4px' }}>{mission.titulo}</p>
          <h2 className="font-magic" style={{ color:'#7B1B1B', fontSize:'1.25rem', margin:0 }}>🧪 Mesa de Pociones</h2>
          <p style={{ color:'#4A2C0A', fontSize:'.85rem', margin:'6px 0 0' }}>Problema {problemIndex + 1} completado</p>
        </div>

        {/* Intro text */}
        {!potionDone && (
          <div className="card" style={{ padding:'14px 16px', textAlign:'center' }}>
            <p style={{ color:'#4A2C0A', fontSize:'.9rem', margin:'0 0 4px', fontWeight:700 }}>
              ¡Has conseguido {ings.length} ingredientes! 🎉
            </p>
            <p style={{ color:'#7B1B1B', fontSize:'.82rem', margin:0, lineHeight:1.5 }}>
              {selected !== null ? 'Pulsa "Echar al caldero" para añadirlo.' : 'Selecciona un ingrediente para echarlo al caldero.'}
            </p>
          </div>
        )}

        {/* Progress */}
        {!potionDone && (
          <div style={{ display:'flex', justifyContent:'center', alignItems:'center', gap:'8px' }}>
            <span style={{ color:'#7B1B1B', fontSize:'.78rem', fontWeight:700 }}>
              Ingredientes en el caldero: {inCauldron.length} / {ings.length}
            </span>
            <div style={{ display:'flex', gap:'4px' }}>
              {ings.map((_, i) => (
                <div key={i} style={{ width:'10px', height:'10px', borderRadius:'50%', background: inCauldron.includes(i) ? '#C86BDE' : 'rgba(200,107,222,.2)', transition:'background .3s' }} />
              ))}
            </div>
          </div>
        )}

        {/* Toast message */}
        {showMsg && (
          <div style={{ background:'linear-gradient(135deg,#1A003A,#2A1050)', border:'1px solid #C86BDE', borderRadius:'12px', padding:'10px 16px', textAlign:'center' }}>
            <p style={{ color:'#F0D8FF', fontSize:'.88rem', margin:0, fontWeight:700 }}>✨ {msg}</p>
          </div>
        )}

        {/* Cauldron */}
        <div style={{ display:'flex', justifyContent:'center' }}>
          <div style={{
            width:'100px', height:'100px',
            background: cauldronPulse
              ? 'radial-gradient(circle, #C86BDE55, #2A1050)'
              : 'radial-gradient(circle, #3A1060, #1A003A)',
            border: `3px solid ${cauldronPulse ? '#C86BDE' : 'rgba(200,107,222,.4)'}`,
            borderRadius:'50%',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:'3rem',
            boxShadow: cauldronPulse ? '0 0 30px #C86BDE88' : '0 0 10px rgba(200,107,222,.2)',
            transition:'all .4s ease',
          }}>
            {potionDone ? '🧪' : '🫧'}
          </div>
        </div>

        {/* Ingredients grid */}
        {!potionDone && (
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px' }}>
            {ings.map((ing, i) => {
              const done = inCauldron.includes(i);
              const isSel = selected === i;
              return (
                <button key={i} onClick={() => selectIng(i)} disabled={done}
                  style={{
                    background: done ? 'rgba(200,107,222,.08)' : isSel ? `linear-gradient(135deg, ${ing.color}33, ${ing.color}18)` : 'linear-gradient(135deg,#FEFBF0,#F5E8BF)',
                    border: `2px solid ${done ? 'rgba(200,107,222,.2)' : isSel ? ing.color : '#C4933A'}`,
                    borderRadius:'14px', padding:'12px 8px',
                    display:'flex', flexDirection:'column', alignItems:'center', gap:'4px',
                    cursor: done ? 'default' : 'pointer',
                    opacity: done ? .45 : 1,
                    transition:'all .25s',
                    boxShadow: isSel ? `0 0 12px ${ing.color}88` : 'none',
                  }}>
                  <span style={{ fontSize: done ? '1.4rem' : '1.8rem', filter: done ? 'grayscale(1)' : 'none' }}>{done ? '✓' : ing.emoji}</span>
                  <span style={{ fontSize:'.7rem', fontWeight:700, color: done ? '#888' : '#4A2C0A', textAlign:'center', lineHeight:1.2 }}>{ing.nombre}</span>
                  {done && <span style={{ fontSize:'.58rem', color:'#C86BDE' }}>En el caldero</span>}
                  {isSel && !done && <span style={{ fontSize:'.58rem', color: ing.color, fontWeight:800 }}>✓ Seleccionado</span>}
                </button>
              );
            })}
          </div>
        )}

        {/* Throw button */}
        {!potionDone && selected !== null && (
          <button className="btn-main" onClick={throwToCauldron}
            style={{ padding:'14px', fontSize:'.95rem', background:'linear-gradient(135deg,#1A003A,#2A1050)', borderColor:'#C86BDE', color:'#F0D8FF' }}>
            🧪 Echar al caldero
          </button>
        )}

        {/* Potion complete! */}
        {potionDone && (
          <div className="anim-scaleIn" style={{ background:'linear-gradient(135deg,#1A003A,#2A1050)', border:'2px solid #C86BDE', borderRadius:'18px', padding:'24px 20px', textAlign:'center' }}>
            <div className="anim-float" style={{ fontSize:'3.5rem', marginBottom:'12px' }}>🧪</div>
            <p style={{ color:'#C86BDE', fontSize:'.7rem', letterSpacing:'2.5px', fontWeight:800, margin:'0 0 6px', textTransform:'uppercase' }}>¡Mini poción completada!</p>
            <p className="font-magic" style={{ color:'#F0D8FF', fontSize:'1.25rem', margin:'0 0 8px' }}>{problem.miniPocionNombre || 'Poción mágica'}</p>
            <p style={{ color:'rgba(240,216,255,.75)', fontSize:'.82rem', margin:'0 0 18px', lineHeight:1.5 }}>
              Lo has conseguido pensando paso a paso. ¡Cada ingrediente llegó por tu esfuerzo!
            </p>
            <div style={{ display:'flex', justifyContent:'center', gap:'8px', marginBottom:'20px' }}>
              {ings.map((ing, i) => (
                <div key={i} style={{ width:'36px', height:'36px', borderRadius:'50%', background:`radial-gradient(circle,${ing.color}55,${ing.color}18)`, border:`2px solid ${ing.color}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'1.1rem' }}>
                  {ing.emoji}
                </div>
              ))}
            </div>
            <button className="btn-main" onClick={onContinue} style={{ padding:'14px 24px', width:'100%' }}>
              {isLast ? '🏆 Ver recompensa final' : '→ Continuar misión'}
            </button>
          </div>
        )}

      </div>
    </Wrap>
  );
}

function App() {
  const [screen,          setScreen]          = useState('home');
  const [mission,         setMission]         = useState(MISSIONS[0]);
  const [probIdx,         setProbIdx]         = useState(0);
  const [potionCompleted, setPotionCompleted] = useState(new Set());

  function selectMission(m) { setMission(m); setProbIdx(0); setPotionCompleted(new Set()); setScreen('intro'); }
  function beginProblems()  { setProbIdx(0); setPotionCompleted(new Set()); setScreen('problem'); }
  function problemDone() {
    if (mission.id === 'dia9' || mission.id === 'dia10' || mission.id === 'dia11' || mission.id === 'dia12') {
      setScreen('mesa-pociones');
    } else {
      setScreen('celebration');
    }
  }

  function onPotionComplete(probIdx) {
    setPotionCompleted(prev => new Set([...prev, probIdx]));
  }

  function afterCelebration() {
    if (probIdx + 1 >= mission.problems.length) {
      setScreen('reward');
    } else {
      setProbIdx(i => i + 1);
      setScreen('problem');
    }
  }

  function afterMesaPociones() {
    if (probIdx + 1 >= mission.problems.length) {
      setScreen('reward');
    } else {
      setProbIdx(i => i + 1);
      setScreen('problem');
    }
  }

  function home() { setProbIdx(0); setScreen('home'); }

  return (
    <>
      {screen === 'home'         && <HomeScreen          onStart={() => setScreen('select')} onCollection={() => setScreen('collection')} onCastle={() => setScreen('castle')} />}
      {screen === 'select'       && <MissionSelectScreen onSelect={selectMission} onBack={() => setScreen('home')} />}
      {screen === 'intro'        && <MissionIntroScreen  mission={mission} onStart={beginProblems} onBack={() => setScreen('select')} />}
      {screen === 'problem'      && <ProblemScreen       key={`${mission.id}-${probIdx}`} mission={mission} problemIndex={probIdx} onComplete={problemDone} onExit={() => setScreen('select')} onPotionComplete={onPotionComplete} />}
      {screen === 'celebration'  && <CelebrationScreen   mission={mission} problemIndex={probIdx} isLast={probIdx + 1 >= mission.problems.length} onNext={afterCelebration} potionCompleted={potionCompleted} />}
      {screen === 'mesa-pociones'&& <PotionWorkbenchScreen mission={mission} problemIndex={probIdx} onContinue={afterMesaPociones} />}
      {screen === 'reward'       && (mission.id === 'dia8' || mission.id === 'dia9' || mission.id === 'dia10' || mission.id === 'dia11' || mission.id === 'dia12')
        ? <MissionCompleteScreen mission={mission} onRepeat={beginProblems} onHome={home} potionCompleted={potionCompleted} />
        : screen === 'reward' && <RewardScreen missionId={mission.id} onViewCollection={() => setScreen('collection')} onHome={home} />}
      {screen === 'collection'   && <CollectionScreen    onBack={() => setScreen('home')} onCastle={() => setScreen('castle')} />}
      {screen === 'castle'       && <CastleScreen        onBack={() => setScreen('home')} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
