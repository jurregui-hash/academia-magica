<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia Mágica de Problemas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      background: #F5EDD8;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(196,147,58,0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(123,27,27,0.07) 0%, transparent 55%),
        linear-gradient(160deg, #FAF0D8 0%, #EDE0B5 50%, #F5EDD8 100%);
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    .font-magic { font-family: 'Cinzel', serif; }

    /* ── Animations ── */
    @keyframes floatUp  { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-7px)} }
    @keyframes twinkle  { 0%,100%{opacity:.9;transform:scale(1)} 50%{opacity:.25;transform:scale(.85)} }
    @keyframes fadeIn   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes scaleIn  { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
    @keyframes pulse    { 0%,100%{box-shadow:0 0 0 0 rgba(196,147,58,.4)} 50%{box-shadow:0 0 0 10px rgba(196,147,58,0)} }
    @keyframes ingDrop      { 0%{transform:scale(0) translateY(-8px);opacity:0} 60%{transform:scale(1.2) translateY(0);opacity:1} 100%{transform:scale(1);opacity:1} }
    @keyframes glowRing     { 0%,100%{box-shadow:0 0 0 0 rgba(200,107,222,0)} 50%{box-shadow:0 0 0 7px rgba(200,107,222,.35)} }
    @keyframes splashFade   { 0%{opacity:0} 10%{opacity:1} 78%{opacity:1} 100%{opacity:0} }
    @keyframes ingBurst     { 0%{transform:scale(0) rotate(-15deg);opacity:0} 55%{transform:scale(1.35) rotate(4deg);opacity:1} 75%{transform:scale(.93)} 100%{transform:scale(1);opacity:1} }
    @keyframes ringPulse    { 0%,100%{transform:scale(.82);opacity:.5} 50%{transform:scale(1.18);opacity:.18} }
    @keyframes sparkOut     { 0%{opacity:0;transform:translate(0,0) scale(0)} 25%{opacity:1;scale:1} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.5)} }

    .anim-float        { animation: floatUp 3.2s ease-in-out infinite; }
    .anim-ing          { animation: ingDrop .55s cubic-bezier(.34,1.56,.64,1) both; }
    .splash-overlay    { animation: splashFade 2.8s ease forwards; }
    .splash-emoji      { animation: ingBurst .7s cubic-bezier(.34,1.56,.64,1) both; }
    .splash-ring       { animation: ringPulse 1.3s ease-in-out infinite; }
    .splash-spark      { animation: sparkOut 1.1s ease-out forwards; }
    .anim-twinkle{ animation: twinkle 2.2s ease-in-out infinite; }
    .anim-fadeIn { animation: fadeIn  .45s ease-out; }
    .anim-scaleIn{ animation: scaleIn .4s  ease-out; }

    /* ── Cards ── */
    .card {
      background: linear-gradient(155deg, #FEFBF0 0%, #F5E8BF 60%, #EDD8A0 100%);
      border: 2px solid #C4933A;
      border-radius: 18px;
      box-shadow: 0 6px 28px rgba(100,65,15,.14), inset 0 1px 0 rgba(255,255,255,.55);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content:'';
      position:absolute;
      top:0; left:0; right:0;
      height:3px;
      background:linear-gradient(90deg,transparent,#C4933A 25%,#DBA94A 50%,#C4933A 75%,transparent);
    }

    /* ── Buttons ── */
    .btn-main {
      background: linear-gradient(135deg,#7B1B1B,#9B2525);
      color: #F5E8C0;
      border: 2px solid #C4933A;
      border-radius: 14px;
      font-family:'Cinzel',serif;
      font-weight:600;
      font-size:1.05rem;
      padding:15px 36px;
      cursor:pointer;
      box-shadow:0 4px 18px rgba(123,27,27,.28), inset 0 1px 0 rgba(255,255,255,.1);
      transition:all .2s;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      width:100%;
      text-align:center;
    }
    .btn-main:hover { background:linear-gradient(135deg,#9B2525,#BB3333); transform:translateY(-2px); box-shadow:0 7px 22px rgba(123,27,27,.38); }
    .btn-main:active { transform:translateY(0); }
    .btn-main:disabled { opacity:.45; cursor:not-allowed; transform:none; }

    .btn-ghost {
      background:linear-gradient(135deg,#FEFBF0,#EFE0B0);
      color:#7B1B1B;
      border:2px solid #C4933A;
      border-radius:12px;
      font-family:'Cinzel',serif;
      font-weight:600;
      font-size:.9rem;
      padding:10px 22px;
      cursor:pointer;
      transition:all .2s;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .btn-ghost:hover { background:linear-gradient(135deg,#EFE0B0,#E0CFA0); transform:translateY(-2px); box-shadow:0 4px 14px rgba(196,147,58,.25); }

    .btn-op {
      background:linear-gradient(155deg,#FEFBF0,#F5E8C0);
      border:2px solid #C4933A;
      border-radius:14px;
      padding:18px 12px;
      cursor:pointer;
      transition:all .2s;
      text-align:center;
      width:100%;
    }
    .btn-op:hover { transform:translateY(-3px); box-shadow:0 8px 22px rgba(196,147,58,.22); border-color:#9B2525; }
    .btn-op.op-correct { background:linear-gradient(155deg,#1A3D2A,#245A38); border-color:#5CB85C; }
    .btn-op.op-wrong   { background:linear-gradient(155deg,#3D1A1A,#5A2424); border-color:#E57373; }

    /* ── Input ── */
    .magic-input {
      background:rgba(255,255,255,.85);
      border:2px solid #C4933A;
      border-radius:10px;
      padding:10px 14px;
      font-size:1.5rem;
      font-family:'Nunito',sans-serif;
      font-weight:800;
      color:#4A2C0A;
      text-align:center;
      width:110px;
      transition:border-color .2s,box-shadow .2s;
      -moz-appearance:textfield;
    }
    .magic-input::-webkit-outer-spin-button,
    .magic-input::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    .magic-input:focus { outline:none; border-color:#7B1B1B; box-shadow:0 0 0 3px rgba(123,27,27,.12); }
    .magic-input.ok  { border-color:#5CB85C; background:rgba(200,240,160,.25); }
    .magic-input.err { border-color:#E57373; background:rgba(255,200,180,.25); }

    /* ── Step dots ── */
    .dot {
      width:42px; height:42px;
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:1.15rem;
      border:2px solid #C4933A;
      background:linear-gradient(135deg,#FEFBF0,#EFE0B0);
      transition:all .3s;
      flex-shrink:0;
    }
    .dot.active {
      background:linear-gradient(135deg,#7B1B1B,#9B2525);
      border-color:#C4933A;
      box-shadow:0 0 0 5px rgba(196,147,58,.28);
      transform:scale(1.12);
    }
    .dot.done {
      background:linear-gradient(135deg,#1A3D2A,#245A38);
      border-color:#5CB85C;
    }

    /* ── Connector line ── */
    .step-line {
      flex:1;
      height:2px;
      max-width:26px;
      border-radius:1px;
      background:rgba(196,147,58,.3);
      transition:background .4s;
    }
    .step-line.done { background:linear-gradient(90deg,#5CB85C,#C4933A); }

    /* ── Feedback boxes ── */
    .fb-ok  { background:rgba(92,184,92,.08);  border:2px solid #5CB85C; border-radius:12px; padding:14px 18px; display:flex; align-items:flex-start; gap:12px; color:#1A3D2A; }
    .fb-err { background:rgba(229,115,115,.08); border:2px solid #E57373; border-radius:12px; padding:14px 18px; display:flex; align-items:flex-start; gap:12px; color:#7B1B1B; }
    .fb-hint{ background:rgba(196,147,58,.12); border:1.5px solid rgba(196,147,58,.6); border-radius:12px; padding:14px 18px; display:flex; align-items:flex-start; gap:10px; color:#6B4A20; }

    /* ── Misc ── */
    .divider {
      display:flex; align-items:center; gap:10px;
      color:#C4933A; font-size:.75rem; letter-spacing:5px; opacity:.7;
    }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,#C4933A,transparent); }

    .tag {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(196,147,58,.13);
      border:1px solid rgba(196,147,58,.45);
      border-radius:20px;
      padding:4px 14px;
      font-size:.82rem;
      color:#7B1B1B;
      font-weight:700;
    }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:#F5EDD8; }
    ::-webkit-scrollbar-thumb { background:#C4933A; border-radius:3px; }

    /* ── Cromo mágico ── */
    @keyframes cardReveal {
      from { opacity:0; transform:scale(.7) translateY(20px); }
      to   { opacity:1; transform:scale(1)  translateY(0);    }
    }
    @keyframes glowPulse {
      0%,100% { box-shadow: 0 0 18px rgba(196,147,58,.35), 0 8px 32px rgba(0,0,0,.35); }
      50%     { box-shadow: 0 0 40px rgba(196,147,58,.65), 0 8px 48px rgba(0,0,0,.45); }
    }
    @keyframes shimmer {
      from { transform:translateX(-120%); }
      to   { transform:translateX(120%);  }
    }
    @keyframes starSpin {
      from { transform:rotate(0deg) scale(1);   }
      50%  { transform:rotate(180deg) scale(1.3); }
      to   { transform:rotate(360deg) scale(1);   }
    }

    .anim-card-reveal { animation: cardReveal .55s cubic-bezier(.34,1.56,.64,1) both; }
    .anim-glow        { animation: glowPulse 2.8s ease-in-out infinite; }
    .anim-star-spin   { animation: starSpin  4s   linear     infinite; }

    .cromo-unlocked {
      background: linear-gradient(155deg, #16163A 0%, #22224E 55%, #16163A 100%);
      border: 2.5px solid #C4933A;
      border-radius: 18px;
      position: relative;
      overflow: hidden;
    }
    .cromo-unlocked::after {
      content:'';
      position:absolute;
      top:0; left:0;
      width:50%; height:100%;
      background:linear-gradient(105deg, transparent 40%, rgba(255,255,255,.1) 50%, transparent 60%);
      animation: shimmer 3.5s ease-in-out infinite;
      pointer-events:none;
    }
    .cromo-locked {
      background: linear-gradient(155deg, #2C2C2C, #3A3A3A);
      border: 2px solid #555;
      border-radius: 18px;
      filter: grayscale(1);
      opacity: .45;
    }

    .rarity-comun       { color:#C4933A; border-color:rgba(196,147,58,.5); background:rgba(196,147,58,.12); }
    .rarity-poco-comun  { color:#5CB85C; border-color:rgba(92,184,92,.5);  background:rgba(92,184,92,.12);  }
    .rarity-raro        { color:#9B6BE8; border-color:rgba(155,107,232,.5);background:rgba(155,107,232,.12);}
    .rarity-epico       { color:#E87B3A; border-color:rgba(232,123,58,.5); background:rgba(232,123,58,.12); }
    .rarity-legendario  { color:#F5D020; border-color:rgba(245,208,32,.5); background:rgba(245,208,32,.12); }

    /* Confeti suave */
    @keyframes confettiDrop {
      from { transform:translateY(-10px) rotate(0deg);   opacity:1; }
      to   { transform:translateY(100vh)  rotate(720deg); opacity:0; }
    }
    .confetti-piece {
      position:fixed; top:-10px;
      width:8px; height:8px;
      border-radius:2px;
      pointer-events:none;
      z-index:999;
      animation: confettiDrop linear forwards;
    }
  </style>
</head>

function loadBuilt() {
  try { return JSON.parse(localStorage.getItem(LS_CASTLE_KEY)) || []; }
  catch { return []; }
}

function loadUnlocked() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch { return []; }
}

function saveUnlocked(ids) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(ids)); } catch {}
}

function unlockCard(id) {
  const current = loadUnlocked();
  if (!current.includes(id)) {
    const next = [...current, id];
    saveUnlocked(next);
    return next;
  }
  return current;
}

function StepOperacion({ problem, onNext }) {
  const [phase, setPhase]           = useState(1);
  const [whatSel, setWhatSel]       = useState(null);
  const [whatStatus, setWhatStatus] = useState('idle');
  const [opSel, setOpSel]           = useState(null);
  const [opStatus, setOpStatus]     = useState('idle');

  const wMap   = WHAT_CORRECT_MAP[problem.what_correct] || WHAT_CORRECT_MAP.unen;
  const opName = (OPERATIONS.find(o => o.key === problem.tipo_correcto) || OPERATIONS[0]).label;

  function pickWhat(opt) {
    if (whatStatus === 'correct') return;
    setWhatSel(opt.key);
    setWhatStatus(opt.key === problem.what_correct ? 'correct' : 'wrong');
  }
  function pickOp(op) {
    if (opStatus === 'correct') return;
    setOpSel(op.key);
    setOpStatus(op.key === problem.tipo_correcto ? 'correct' : 'wrong');
  }

  if (phase === 1) return (
    <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'18px' }}>
      <div style={{ background:'rgba(26,26,64,.07)', border:'1.5px solid rgba(26,26,64,.18)', borderRadius:'12px', padding:'14px 18px', textAlign:'center' }}>

        </p>
      </div>
      <div style={{ background:'rgba(196,147,58,.1)', border:'1px solid rgba(196,147,58,.3)', borderRadius:'10px', padding:'12px 16px', textAlign:'center' }}>
        <p style={{ color:'#4A2C0A', fontSize:'.9rem', margin:0, fontStyle:'italic' }}>"{problem.pregunta}"</p>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px' }}>
        {WHAT_OPTIONS.map(opt => {
          const sel = whatSel === opt.key;
          const cls = sel ? (whatStatus === 'correct' ? ' op-correct' : ' op-wrong') : '';
          return (
            <button key={opt.key} className={`btn-op${cls}`} onClick={() => pickWhat(opt)}
              disabled={whatStatus === 'correct' && !sel} style={{ opacity: whatStatus === 'correct' && !sel ? .4 : 1 }}>
              <div style={{ fontSize:'1.8rem', marginBottom:'6px' }}>{opt.icon}</div>
              <div className="font-magic" style={{ fontSize:'.82rem', fontWeight:700, color: sel ? 'inherit' : '#7B1B1B', lineHeight:1.3 }}>{opt.label}</div>
            </button>
          );
        })}
      </div>
      {whatStatus === 'correct' && (
        <div className="fb-ok anim-scaleIn">
          <span style={{ fontSize:'1.4rem' }}>✨</span>
          <div>
            <p style={{ margin:'0 0 4px', fontWeight:700 }}>¡Muy bien! Las cantidades {wMap.label}.</p>
            <p style={{ margin:0, fontSize:'.9rem', opacity:.85 }}>Cuando las cantidades {wMap.label}, la operación es <strong>{wMap.op}</strong>. ¡Ahora elígela!</p>
          </div>
        </div>
      )}
      {whatStatus === 'wrong' && (
        <>
          <div className="fb-err anim-scaleIn">
            <span style={{ fontSize:'1.3rem' }}>💫</span>
            <div>
              <p style={{ margin:'0 0 4px', fontWeight:700 }}>Inténtalo de nuevo.</p>
              <p style={{ margin:0, fontSize:'.9rem', opacity:.85 }}>{wMap.reminder}</p>
            </div>
          </div>
          <button className="btn-ghost" onClick={() => { setWhatSel(null); setWhatStatus('idle'); }} style={{ width:'100%' }}>🔄 Intentar de nuevo</button>
        </>
      )}
      {whatStatus === 'correct' && (
        <button className="btn-main" onClick={() => setPhase(2)} style={{ padding:'16px' }}>¡Entendido! Elegir la operación →</button>
      )}
    </div>
  );

  return (
    <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'18px' }}>
      <div style={{ background:'rgba(26,26,64,.07)', border:'1.5px solid rgba(26,26,64,.18)', borderRadius:'12px', padding:'14px 18px', textAlign:'center' }}>
        <p style={{ color:'#4A2C0A', fontSize:'1rem', margin:0, fontWeight:700 }}>
          Las cantidades {wMap.label}.<br/><span style={{ fontWeight:800 }}>¿Qué operación usamos?</span>
        </p>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px' }}>
        {OPERATIONS.map(op => {
          const sel = opSel === op.key;
          const cls = sel ? (opStatus === 'correct' ? ' op-correct' : ' op-wrong') : '';
          return (
            <button key={op.key} className={`btn-op${cls}`} onClick={() => pickOp(op)}
              disabled={opStatus === 'correct' && !sel} style={{ opacity: opStatus === 'correct' && !sel ? .4 : 1 }}>
              <div style={{ fontSize:'2rem', marginBottom:'6px' }}>{op.symbol}</div>
              <div className="font-magic" style={{ fontSize:'.85rem', fontWeight:700, marginBottom:'4px', color: sel ? 'inherit' : '#7B1B1B' }}>{op.label}</div>
              <div style={{ fontSize:'.75rem', color: sel ? 'inherit' : '#6B4A20', opacity:.88 }}>{op.desc}</div>

        <div className="fb-ok anim-scaleIn">

            <p style={{ margin:'0 0 4px', fontWeight:700 }}>¡Perfecto! La operación es {opName}.</p>

      {opStatus === 'wrong' && (
        <>
          <div className="fb-err anim-scaleIn">
            <span style={{ fontSize:'1.3rem' }}>💫</span>
            <div>
              <p style={{ margin:'0 0 4px', fontWeight:700 }}>Inténtalo de nuevo.</p>
              <p style={{ margin:0, fontSize:'.9rem', opacity:.85 }}>Recuerda: las cantidades {wMap.label} → la operación es {wMap.op}.</p>

          </div>
          <button className="btn-ghost" onClick={() => { setOpSel(null); setOpStatus('idle'); }} style={{ width:'100%' }}>🔄 Intentar de nuevo</button>
        </>
      )}
      {opStatus === 'correct' && (
        <button className="btn-main" onClick={onNext} style={{ padding:'16px' }}>¡Genial! Siguiente →</button>
      )}
    </div>
  );
}

function StepCalculo({ problem, onNext, onSave }) {
  // phase 1 = hacer en papel; phase 2 = elegir respuesta
  const [phase, setPhase]   = useState(1);
  const [sel, setSel]       = useState(null);
  const [status, setStatus] = useState('idle'); // idle | correct | wrong
  const [hint, setHint]     = useState(false);
  const [tries, setTries]   = useState(0);

  function pick(n) {
    if (status === 'correct') return;
    setSel(n);
    if (n === problem.resultado) {
      setStatus('correct');
      onSave(n);
    } else {
      setStatus('wrong');
      setTries(t => t + 1);
    }
  }

  function retry() {
    setSel(null);
    setStatus('idle');
  }

  // ── FASE 1: instrucción de papel ──
  if (phase === 1) return (

          Coge tu papel y tu lápiz.<br/>
          <span style={{ fontWeight:800 }}>¡Haz la cuenta!</span>
        </p>
      </div>

      <div className="card" style={{ padding:'28px 24px', textAlign:'center' }}>
        <p style={{ color:'#6B4A20', fontSize:'.85rem', margin:'0 0 18px', fontStyle:'italic' }}>
          Copia esta suma en tu papel y resuélvela:
        </p>

        {/* Columna de números estilo libreta */}
        <div style={{ display:'inline-block', background:'rgba(255,255,255,.65)', border:'1px solid rgba(196,147,58,.45)', borderRadius:'12px', padding:'18px 36px' }}>
          {problem.numeros.map((n, i) => (
            <div key={i} style={{
              display:'flex', alignItems:'center', justifyContent:'flex-end', gap:'12px',
              fontSize:'2.2rem', fontWeight:800, color:'#7B1B1B', lineHeight:1.5,
              borderBottom: i === problem.numeros.length - 1 ? '3px solid #7B1B1B' : 'none',
              paddingBottom: i === problem.numeros.length - 1 ? '5px' : 0,
            }}>
              <span style={{ color:'#C4933A', fontSize:'1.5rem', width:'24px', textAlign:'center' }}>
                {i === 0 ? '' : '+'}
              </span>
              <span style={{ minWidth:'60px', textAlign:'right' }}>{n}</span>
            </div>
          ))}
          {/* Línea de resultado en blanco */}

          </div>
        </div>
      </div>

      <div style={{ background:'rgba(196,147,58,.1)', border:'1px solid rgba(196,147,58,.35)', borderRadius:'12px', padding:'14px 18px', display:'flex', alignItems:'center', gap:'12px' }}>

        <p style={{ color:'#6B4A20', fontSize:'.92rem', margin:0 }}>
          Cuando tengas el resultado en tu papel, pulsa el botón para elegir la respuesta.
        </p>
      </div>

      <button className="btn-main" onClick={() => setPhase(2)} style={{ padding:'16px' }}>
        ✅ Ya tengo el resultado — Elegir respuesta
      </button>
    </div>
  );

  // ── FASE 2: elegir entre 4 opciones ──
  return (
    <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'18px' }}>
      <div style={{ background:'rgba(26,61,42,.09)', border:'1.5px solid rgba(26,61,42,.22)', borderRadius:'12px', padding:'14px 18px', textAlign:'center' }}>
        <p style={{ color:'#4A2C0A', fontSize:'1rem', margin:0, fontWeight:700 }}>
          ¿Cuál es el resultado que has calculado?
        </p>
      </div>

      {/* Recap de la operación */}
      <div style={{ textAlign:'center', fontSize:'.9rem', color:'#6B4A20', fontStyle:'italic' }}>
        {problem.numeros.join(' + ')} = ?
      </div>

      {/* 4 opciones */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'14px' }}>
        {problem.opciones.map(n => {
          const isSelected = sel === n;
          const isCorrect  = n === problem.resultado;
          let bg = 'linear-gradient(155deg,#FEFBF0,#F5E8C0)';
          let border = '2px solid #C4933A';
          let color  = '#7B1B1B';
          if (isSelected && status === 'correct') {
            bg = 'linear-gradient(155deg,#1A3D2A,#245A38)';
            border = '2px solid #5CB85C';
            color = '#C8F0A0';
          } else if (isSelected && status === 'wrong') {
            bg = 'linear-gradient(155deg,#3D1A1A,#5A2424)';
            border = '2px solid #E57373';
            color = '#FFDDD0';
          }
          return (
            <button
              key={n}
              onClick={() => pick(n)}
              disabled={status === 'correct'}
              style={{
                background: bg,
                border,
                borderRadius:'14px',
                padding:'22px 12px',
                cursor: status === 'correct' ? 'default' : 'pointer',
                opacity: status === 'correct' && !isSelected ? .45 : 1,
                transition:'all .2s',
                transform: isSelected && status === 'idle' ? 'scale(1)' : 'scale(1)',
              }}
            >
              <div style={{ fontSize:'2rem', fontWeight:800, color, fontFamily:"'Nunito',sans-serif", lineHeight:1 }}>
                {n}
              </div>
            </button>
          );
        })}
      </div>

      {/* Pista opcional */}
      {(hint || tries >= 1) && (
        <div className="fb-hint">
          <span style={{ fontSize:'1.1rem' }}>💡</span>
          <p style={{ margin:0, fontSize:'.9rem', fontStyle:'italic' }}>{problem.pista}</p>
        </div>
      )}

      {status === 'correct' && (
        <div className="fb-ok anim-scaleIn">
          <span style={{ fontSize:'1.5rem' }}>🌟</span>
          <div>
            <p style={{ margin:'0 0 4px', fontWeight:700 }}>¡Correcto! El resultado es {problem.resultado}.</p>
            <p style={{ margin:0, fontSize:'.9rem', opacity:.85 }}>¡Lo has calculado perfectamente en tu papel!</p>
          </div>
        </div>
      )}

      {status === 'wrong' && (
        <>
          <div className="fb-err anim-scaleIn">
            <span style={{ fontSize:'1.3rem' }}>💫</span>
            <p style={{ margin:0 }}>Ese no es el resultado. ¡Revisa tu cuenta en el papel!</p>
          </div>
          <div style={{ display:'flex', gap:'12px' }}>
            {!hint && (
              <button className="btn-ghost" onClick={() => setHint(true)} style={{ flex:1 }}>💡 Ver pista</button>
            )}
            <button className="btn-ghost" onClick={retry} style={{ flex:1 }}>🔄 Intentar de nuevo</button>
          </div>
        </>
      )}

      {status === 'correct' && (
        <button className="btn-main" onClick={onNext} style={{ padding:'16px' }}>¡Genial! Último paso →</button>
      )}
    </div>
  );
}

// Journey map SVG for viaje problems
function JourneyMapSVG({ inicio, paradas, resultados }) {
  const total = paradas.length;
  const nodeX = (i) => 28 + i * (264 / total);
  const colors = { bajan:'#E87B3A', suben:'#5CB85C' };

  return (
    <svg viewBox={`0 0 320 90`} xmlns="http://www.w3.org/2000/svg" style={{ width:'100%', display:'block' }}>
      {/* Track line */}
      <line x1="20" y1="55" x2="300" y2="55" stroke="#C4933A" strokeWidth="2.5" strokeDasharray="6 3" opacity=".5"/>
      {/* Start node */}
      <circle cx="20" cy="55" r="10" fill="#7B1B1B"/>
      <text x="20" y="59.5" fontSize="7" fill="#F5E8C0" textAnchor="middle" fontFamily="Nunito,sans-serif" fontWeight="800">🏙</text>
      <text x="20" y="74" fontSize="7.5" fill="#4A2C0A" textAnchor="middle" fontFamily="Nunito,sans-serif" fontWeight="700">{inicio}</text>
      {/* Stop nodes */}
      {paradas.map((p, i) => {
        const x = nodeX(i + 1);
        const done = resultados.length > i;
        const color = p.accion === 'bajan' ? colors.bajan : colors.suben;
        const badge = p.accion === 'bajan' ? `↓${p.cantidad}` : `↑${p.cantidad}`;
        return (
          <g key={i}>
            <circle cx={x} cy="55" r="9" fill={done ? color : '#E8D8A0'} stroke={color} strokeWidth="1.5"/>
            <text x={x} y="59" fontSize="7" fill={done ? 'white' : '#6B4A20'} textAnchor="middle" fontFamily="Nunito,sans-serif" fontWeight="800">
              {p.num}
            </text>
            <text x={x} y="38" fontSize="7.5" fill={color} textAnchor="middle" fontFamily="Nunito,sans-serif" fontWeight="700">{badge}</text>
            {done && (
              <text x={x} y="75" fontSize="8" fill="#1A3D2A" textAnchor="middle" fontFamily="Nunito,sans-serif" fontWeight="800">{resultados[i]}</text>
            )}
          </g>
        );
      })}
      {/* Castle end node */}
      <circle cx="300" cy="55" r="10" fill={resultados.length === total ? '#1A3D2A' : '#E8D8A0'} stroke="#C4933A" strokeWidth="1.5"/>
      <text x="300" y="59.5" fontSize="8" fill={resultados.length === total ? '#C8F0A0' : '#6B4A20'} textAnchor="middle" fontFamily="Nunito,sans-serif">🏰</text>
      {resultados.length === total && (
        <text x="300" y="75" fontSize="8" fill="#1A3D2A" textAnchor="middle" fontFamily="Nunito,sans-serif" fontWeight="800">{resultados[resultados.length-1]}</text>
      )}
    </svg>
  );
}

// ── STEP: multi-paso calculator (problem 3 — dos paradas) ───
function StepCalculoMultiPaso({ problem, onNext, onSave }) {
  const [pasoIdx, setPasoIdx] = useState(0);
  const [sel, setSel]         = useState(null);
  const [status, setStatus]   = useState('idle');
  const [resultados, setResultados] = useState([]);

  const paso = problem.pasos[pasoIdx];
  const isLast = pasoIdx === problem.pasos.length - 1;

  function pick(n) {
    if (status === 'correct') return;
    setSel(n);
    if (n === paso.resultado) {
      setStatus('correct');
      const newRes = [...resultados, n];
      setResultados(newRes);
      if (isLast) onSave(n);
    } else {
      setStatus('wrong');
    }
  }

  function next() {
    setPasoIdx(i => i + 1);
    setSel(null);
    setStatus('idle');
  }

  return (
    <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'18px' }}>
      <div style={{ background:'rgba(26,61,42,.09)', border:'1.5px solid rgba(26,61,42,.22)', borderRadius:'12px', padding:'14px 18px', textAlign:'center' }}>
        <p style={{ color:'#4A2C0A', fontSize:'1rem', margin:0, fontWeight:700 }}>
          Paso {pasoIdx + 1} de {problem.pasos.length}: {paso.desc}
        </p>
      </div>

      <TrainSVG action={paso.accion === 'bajan' ? 'down' : 'up'}/>

      <div className="card" style={{ padding:'20px 24px', textAlign:'center' }}>
        <p style={{ color:'#6B4A20', fontSize:'.85rem', margin:'0 0 14px', fontStyle:'italic' }}>
          Coge tu papel y calcula:
        </p>
        <div style={{ display:'inline-block', background:'rgba(255,255,255,.6)', border:'1px solid rgba(196,147,58,.4)', borderRadius:'12px', padding:'14px 28px', marginBottom:'6px' }}>
          <div style={{ fontSize:'2rem', fontWeight:800, color:'#7B1B1B', lineHeight:1.5 }}>{paso.inicio}</div>
          <div style={{ fontSize:'2rem', fontWeight:800, color:'#C4933A', lineHeight:1.5 }}>{paso.simbolo} {paso.cantidad}</div>
          <div style={{ borderTop:'3px solid #7B1B1B', paddingTop:'4px', fontSize:'1.8rem', color:'#C4933A', letterSpacing:'6px' }}>???</div>
        </div>
      </div>

      <p style={{ color:'#6B4A20', fontSize:'.88rem', textAlign:'center', margin:0, fontWeight:600 }}>
        ¿Cuántos alumnos hay después de esta parada?
      </p>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px' }}>
        {paso.opciones.map(n => {
          const isSel = sel === n;
          const isOk  = n === paso.resultado;
          let bg = 'linear-gradient(155deg,#FEFBF0,#F5E8C0)';
          let border = '2px solid #C4933A';
          let color = '#7B1B1B';
          if (isSel && status === 'correct') { bg='linear-gradient(155deg,#1A3D2A,#245A38)'; border='2px solid #5CB85C'; color='#C8F0A0'; }
          if (isSel && status === 'wrong')   { bg='linear-gradient(155deg,#3D1A1A,#5A2424)'; border='2px solid #E57373'; color='#FFDDD0'; }
          return (
            <button key={n} onClick={() => pick(n)} disabled={status==='correct'}
              style={{ background:bg, border, borderRadius:'14px', padding:'20px 12px', cursor:status==='correct'?'default':'pointer', opacity: status==='correct'&&!isSel?.45:1, transition:'all .2s' }}>
              <div style={{ fontSize:'1.9rem', fontWeight:800, color, fontFamily:"'Nunito',sans-serif" }}>{n}</div>
            </button>
          );
        })}
      </div>

      {status === 'correct' && (
        <div className="fb-ok anim-scaleIn">
          <span style={{ fontSize:'1.4rem' }}>🌟</span>
          <div>
            <p style={{ margin:'0 0 4px', fontWeight:700 }}>¡Correcto! Quedan {paso.resultado} alumnos.</p>
            <p style={{ margin:0, fontSize:'.9rem', opacity:.85 }}>
              {isLast ? '¡Has resuelto los dos pasos!' : 'Ahora vamos con la siguiente parada.'}
            </p>
          </div>
        </div>
      )}
      {status === 'wrong' && (
        <div className="fb-err anim-scaleIn">
          <span style={{ fontSize:'1.3rem' }}>💫</span>
          <p style={{ margin:0 }}>Ese no es el resultado. ¡Revisa tu cuenta en el papel!</p>
        </div>
      )}

      {status === 'correct' && !isLast && (
        <button className="btn-main" onClick={next} style={{ padding:'16px' }}>Siguiente parada →</button>
      )}
      {status === 'correct' && isLast && (
        <button className="btn-main" onClick={onNext} style={{ padding:'16px' }}>¡Terminado! Último paso →</button>
      )}
    </div>
  );
}

// ── STEP: viaje calculator (problem 4 — five stops + bonus) ─
function StepCalculoViaje({ problem, onNext, onSave }) {
  // phases: 'stops' → 'bonus' → 'done'
  const [phase, setPhase]       = useState('stops');
  const [stopIdx, setStopIdx]   = useState(0);
  const [bonusIdx, setBonusIdx] = useState(0);
  const [sel, setSel]           = useState(null);
  const [status, setStatus]     = useState('idle');
  const [resultados, setResultados] = useState([]);

  const parada    = problem.paradas[stopIdx];
  const bonusQ    = problem.bonus[bonusIdx];
  const isLastStop  = stopIdx  === problem.paradas.length - 1;
  const isLastBonus = bonusIdx === problem.bonus.length - 1;

  function pickStop(n) {
    if (status === 'correct') return;
    setSel(n);
    if (n === parada.resultado) {
      const nr = [...resultados, n];
      setResultados(nr);
      setStatus('correct');
      if (isLastStop) onSave(n);
    } else {
      setStatus('wrong');
    }
  }

  function pickBonus(n) {
    if (status === 'correct') return;
    setSel(n);
    setStatus(n === bonusQ.resultado ? 'correct' : 'wrong');
  }

  function nextStop() { setStopIdx(i=>i+1); setSel(null); setStatus('idle'); }
  function nextBonus() { setBonusIdx(i=>i+1); setSel(null); setStatus('idle'); }
  function goBonus() { setPhase('bonus'); setSel(null); setStatus('idle'); }

  const renderOptions = (opts, correctVal, pickFn) => (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px' }}>
      {opts.map(n => {
        const isSel = sel === n;
        let bg='linear-gradient(155deg,#FEFBF0,#F5E8C0)', border='2px solid #C4933A', color='#7B1B1B';
        if (isSel && status==='correct') { bg='linear-gradient(155deg,#1A3D2A,#245A38)'; border='2px solid #5CB85C'; color='#C8F0A0'; }
        if (isSel && status==='wrong')   { bg='linear-gradient(155deg,#3D1A1A,#5A2424)'; border='2px solid #E57373'; color='#FFDDD0'; }
        return (
          <button key={n} onClick={() => pickFn(n)} disabled={status==='correct'}
            style={{ background:bg, border, borderRadius:'14px', padding:'20px', cursor:status==='correct'?'default':'pointer', opacity: status==='correct'&&!isSel?.4:1, transition:'all .2s' }}>
            <div style={{ fontSize:'1.9rem', fontWeight:800, color, fontFamily:"'Nunito',sans-serif" }}>{n}</div>
          </button>
        );
      })}
    </div>
  );

  if (phase === 'stops') {
    const current = parada;
    const accionLabel = current.accion === 'bajan' ? 'bajan' : 'suben';
    const simbolo     = current.accion === 'bajan' ? '−' : '+';
    const inicio      = stopIdx === 0 ? problem.inicio : resultados[stopIdx - 1];

function StepRespuesta({ problem, result, onComplete }) {
  const [val, setVal] = useState('');
  const [status, setStatus] = useState('idle');
  const inputRef = useRef();

  useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);

  function check() {
    const n = parseInt(val.trim(), 10);
    setStatus(n === result ? 'correct' : 'wrong');
  }

  return (
    <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'18px' }}>
      <div style={{ background:'rgba(74,44,10,.09)', border:'1.5px solid rgba(74,44,10,.22)', borderRadius:'12px', padding:'14px 18px', textAlign:'center' }}>

        </p>
      </div>

      <div className="card" style={{ padding:'28px 24px', textAlign:'center' }}>
        <p style={{ color:'#6B4A20', fontSize:'.85rem', margin:'0 0 20px', fontStyle:'italic' }}>Completa la frase de respuesta:</p>
        <div style={{ display:'flex', flexWrap:'wrap', alignItems:'center', justifyContent:'center', gap:'8px', fontSize:'1.05rem', color:'#4A2C0A', lineHeight:2 }}>
          <span style={{ fontWeight:700 }}>{problem.respuesta_a}</span>
          <input
            ref={inputRef}
            type="number"
            className={`magic-input${status === 'correct' ? ' ok' : status === 'wrong' ? ' err' : ''}`}
            value={val}
            onChange={e => { setVal(e.target.value); setStatus('idle'); }}
            onKeyDown={e => e.key === 'Enter' && val && status !== 'correct' && check()}
            placeholder="___"
            disabled={status === 'correct'}
          />
          <span style={{ fontWeight:700 }}>{problem.respuesta_b}</span>
        </div>
      </div>

      {status === 'correct' && (
        <div className="fb-ok anim-scaleIn">
          <span style={{ fontSize:'1.6rem' }}>🎉</span>
          <div>
            <p style={{ margin:'0 0 4px', fontWeight:700, fontSize:'1.05rem' }}>¡Respuesta perfecta!</p>
            <p style={{ margin:0, fontSize:'.9rem', opacity:.85, fontStyle:'italic' }}>
              {problem.respuesta_a} <strong>{result}</strong> {problem.respuesta_b}

          </div>
        </div>

      {status === 'wrong' && (
        <div className="fb-err anim-scaleIn">
          <span style={{ fontSize:'1.3rem' }}>💫</span>
          <p style={{ margin:0 }}>
            Recuerda: el resultado que calculaste antes era <strong>{result}</strong>. ¡Escríbelo!
          </p>
        </div>
      )}

      {status !== 'correct' && (
        <button className="btn-main" onClick={check} disabled={!val.trim()} style={{ padding:'16px' }}>
          ✓ Comprobar respuesta
        </button>
      )}

      {status === 'correct' && (
        <button
          className="btn-main anim-scaleIn"
          onClick={onComplete}
          style={{ padding:'18px', background:'linear-gradient(135deg,#1A3D2A,#245A38)', borderColor:'#5CB85C', fontSize:'1.1rem' }}
        >
          🌟 ¡Problema completado!
        </button>
      )}
    </div>
  );
}

// ── STEP: elegir operación directamente (Misión 3 tipo 'eleccion') ──────────
const OP_BUTTONS = [
  { key:'sumar',       label:'SUMAR',       symbol:'+', color:'#1A3D2A', accent:'#5CB85C', hint:'Juntamos cantidades' },
  { key:'restar',      label:'RESTAR',      symbol:'−', color:'#3D1A1A', accent:'#E57373', hint:'Quitamos cantidades' },
  { key:'multiplicar', label:'MULTIPLICAR', symbol:'×', color:'#16163A', accent:'#9B6BE8', hint:'Grupos iguales' },
  { key:'dividir',     label:'DIVIDIR',     symbol:'÷', color:'#3A2A0A', accent:'#C4933A', hint:'Repartimos en partes' },
  { key:'fraccion',    label:'FRACCIÓN',    symbol:'⅓', color:'#1A003A', accent:'#C86BDE', hint:'Parte de un total' },
];

function StepElegirOperacion({ problem, onNext }) {
  const [sel,    setSel]    = useState(null);
  const [status, setStatus] = useState('idle');

  function pick(key) {
    if (status === 'correct') return;
    setSel(key);
    setStatus(key === problem.operacion_correcta ? 'correct' : 'wrong');
  }

  return (
    <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'18px' }}>
      <div style={{ background:'rgba(26,26,64,.07)', border:'1.5px solid rgba(26,26,64,.18)', borderRadius:'12px', padding:'14px 18px', textAlign:'center' }}>
        <p style={{ color:'#4A2C0A', fontSize:'1rem', margin:0, fontWeight:700 }}>
          Antes de calcular…<br/>
          <span style={{ fontWeight:800 }}>¿Qué operación necesitas?</span>
        </p>
      </div>

        <p style={{ color:'#4A2C0A', fontSize:'.9rem', margin:0, fontStyle:'italic' }}>"{problem.pregunta}"</p>
      </div>

      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px' }}>
        {OP_BUTTONS.map(op => {
          const isSel  = sel === op.key;
          const cls    = isSel ? (status === 'correct' ? ' op-correct' : ' op-wrong') : '';
          return (
            <button key={op.key} className={`btn-op${cls}`}
              onClick={() => pick(op.key)}
              disabled={status === 'correct' && !isSel}
              style={{ opacity: status === 'correct' && !isSel ? .38 : 1 }}>
              <div style={{ fontSize:'2.2rem', fontWeight:800, marginBottom:'6px',
                color: isSel ? 'inherit' : op.accent }}>{op.symbol}</div>
              <div className="font-magic" style={{ fontSize:'.82rem', fontWeight:700,
                color: isSel ? 'inherit' : '#7B1B1B', lineHeight:1.3 }}>{op.label}</div>
              <div style={{ fontSize:'.72rem', color: isSel ? 'inherit' : '#6B4A20',
                opacity:.85, marginTop:'4px' }}>{op.hint}</div>
            </button>
          );
        })}
      </div>

      {status === 'correct' && (
        <div className="fb-ok anim-scaleIn">
          <span style={{ fontSize:'1.4rem' }}>✨</span>
          <div>
            <p style={{ margin:'0 0 4px', fontWeight:700 }}>¡Muy bien! Has elegido el hechizo correcto.</p>
            <p style={{ margin:0, fontSize:'.9rem', opacity:.85 }}>Ahora haz la cuenta en tu papel.</p>
          </div>
        </div>
      )}
      {status === 'wrong' && (
        <>
          <div className="fb-err anim-scaleIn">
            <span style={{ fontSize:'1.3rem' }}>💫</span>
            <div>
              <p style={{ margin:'0 0 4px', fontWeight:700 }}>Vamos a mirar la historia otra vez.</p>
              <p style={{ margin:0, fontSize:'.9rem', opacity:.85 }}>{problem.ayuda_operacion}</p>
            </div>
          </div>
          <button className="btn-ghost" onClick={() => { setSel(null); setStatus('idle'); }} style={{ width:'100%' }}>
            🔄 Intentar de nuevo
          </button>
        </>
      )}
      {status === 'correct' && (
        <button className="btn-main" onClick={onNext} style={{ padding:'16px' }}>¡Genial! Hacer la cuenta →</button>
      )}
    </div>
  );
}

            <p style={{ margin:0 }}>Ese no es el resultado. Revisa tu operación en papel.</p>

            <div className="fb-hint">

// ── STEP: dos fases integradas (tipo 'eleccion-dos', problema 5) ─────────────
function StepCalculoDosFases({ problem, onNext, onSave }) {
  const inputRef = React.useRef(null);
  const [faseIdx,     setFaseIdx]     = useState(0);
  const [fase0Result, setFase0Result] = useState(null);
  // per-phase state
  const [opSel,    setOpSel]    = useState(null);
  const [opStatus, setOpStatus] = useState('idle'); // idle | correct | wrong
  const [val,      setVal]      = useState('');
  const [calcStatus, setCalcStatus] = useState('idle');
  const [tries,    setTries]    = useState(0);
  const [subPhase, setSubPhase] = useState('op'); // 'op' | 'calc'

  const fase = problem.fases[faseIdx];

  React.useEffect(() => {
    if (subPhase === 'calc' && inputRef.current) inputRef.current.focus();
  }, [subPhase]);

  function pickOp(key) {
    if (opStatus === 'correct') return;
    setOpSel(key);
    setOpStatus(key === fase.operacion_correcta ? 'correct' : 'wrong');
  }

  function goToCalc() { setSubPhase('calc'); }

  function checkCalc() {
    const n = parseInt(val, 10);
    if (n === fase.resultado) {
      setCalcStatus('correct');
      if (faseIdx === 0) {
        setFase0Result(n);
      } else {
        onSave(n);
      }
    } else {
      setCalcStatus('wrong');
      setTries(t => t + 1);
    }
  }

  function goToFase1() {
    setFaseIdx(1);
    setOpSel(null); setOpStatus('idle');
    setVal(''); setCalcStatus('idle');
    setTries(0); setSubPhase('op');
  }

  return (
    <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'18px' }}>
      {/* Phase indicator */}
      <div style={{ display:'flex', gap:'10px', justifyContent:'center' }}>
        {problem.fases.map((_, i) => (
          <div key={i} style={{
            display:'flex', alignItems:'center', gap:'6px', padding:'6px 14px',
            borderRadius:'20px', fontSize:'.8rem', fontWeight:700,
            background: i === faseIdx ? 'linear-gradient(135deg,#7B1B1B,#9B2525)' : i < faseIdx ? 'linear-gradient(135deg,#1A3D2A,#245A38)' : 'rgba(196,147,58,.12)',
            color: i === faseIdx || i < faseIdx ? '#F5E8C0' : '#7B1B1B',
            border: `1.5px solid ${i === faseIdx ? '#C4933A' : i < faseIdx ? '#5CB85C' : 'rgba(196,147,58,.3)'}`,
          }}>
            {i < faseIdx ? '✓' : `Parte ${i + 1}`}
          </div>
        ))}
      </div>

      {/* Current question */}
      <div style={{ background:'linear-gradient(135deg,#7B1B1B,#9B2525)', border:'2px solid #C4933A', borderRadius:'14px', padding:'18px 20px', textAlign:'center' }}>
        <p style={{ color:'#F5D080', fontSize:'1rem', fontWeight:700, margin:0, lineHeight:1.5 }}>{fase.pregunta}</p>
      </div>

      {/* Context from fase 0 (shown in fase 1) */}
      {faseIdx === 1 && fase0Result !== null && (
        <div style={{ background:'rgba(92,184,92,.12)', border:'1.5px solid rgba(92,184,92,.45)', borderRadius:'10px', padding:'10px 14px', textAlign:'center' }}>
          <p style={{ color:'#1A3D2A', fontSize:'.88rem', margin:0 }}>
            📝 Resultado anterior: <strong>{fase0Result} ranas</strong>
          </p>
        </div>
      )}

      {/* ── SUB-PHASE: choose operation ── */}
      {subPhase === 'op' && (
        <>
          <p style={{ color:'#4A2C0A', fontSize:'.92rem', fontWeight:700, textAlign:'center', margin:0 }}>
            ¿Qué operación necesitas?
          </p>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px' }}>
            {OP_BUTTONS.map(op => {
              const isSel = opSel === op.key;
              const cls   = isSel ? (opStatus === 'correct' ? ' op-correct' : ' op-wrong') : '';
              return (
                <button key={op.key} className={`btn-op${cls}`} onClick={() => pickOp(op.key)}
                  disabled={opStatus === 'correct' && !isSel}
                  style={{ opacity: opStatus === 'correct' && !isSel ? .38 : 1 }}>
                  <div style={{ fontSize:'2rem', fontWeight:800, marginBottom:'4px', color: isSel ? 'inherit' : op.accent }}>{op.symbol}</div>
                  <div className="font-magic" style={{ fontSize:'.78rem', fontWeight:700, color: isSel ? 'inherit' : '#7B1B1B' }}>{op.label}</div>
                </button>
              );
            })}
          </div>
          {opStatus === 'correct' && (
            <div className="fb-ok anim-scaleIn">
              <span style={{ fontSize:'1.3rem' }}>✨</span>
              <div>
                <p style={{ margin:'0 0 4px', fontWeight:700 }}>¡Correcto! Ahora haz la cuenta en papel.</p>
              </div>
            </div>
          )}
          {opStatus === 'wrong' && (
            <>
              <div className="fb-err anim-scaleIn">
                <span style={{ fontSize:'1.2rem' }}>💫</span>
                <div>
                  <p style={{ margin:'0 0 4px', fontWeight:700 }}>Vamos a pensar de nuevo.</p>
                  <p style={{ margin:0, fontSize:'.88rem', opacity:.85 }}>{fase.ayuda_operacion}</p>
                </div>
              </div>
              <button className="btn-ghost" onClick={() => { setOpSel(null); setOpStatus('idle'); }} style={{ width:'100%' }}>
                🔄 Intentar de nuevo
              </button>
            </>
          )}
          {opStatus === 'correct' && (
            <button className="btn-main" onClick={goToCalc} style={{ padding:'14px' }}>Hacer la cuenta →</button>
          )}
        </>
      )}

      {/* ── SUB-PHASE: calculate ── */}
      {subPhase === 'calc' && (
        <>
          <div style={{ background:'rgba(255,255,255,.65)', border:'2px dashed rgba(196,147,58,.55)', borderRadius:'14px', padding:'18px', textAlign:'center' }}>
            <p style={{ color:'#C4933A', fontSize:'.8rem', letterSpacing:'2px', margin:'0 0 10px', fontWeight:700 }}>✏️ MI OPERACIÓN EN PAPEL</p>
            <p style={{ color:'#B0A08A', fontSize:'.85rem', margin:0, fontStyle:'italic' }}>
              Escribe la operación en tu cuaderno y resuélvela.
            </p>
          </div>
          <div className="card" style={{ padding:'20px', textAlign:'center' }}>
            <p style={{ color:'#6B4A20', fontSize:'.9rem', margin:'0 0 14px', fontWeight:700 }}>¿Cuál es el resultado?</p>
            <input
              ref={inputRef}
              type="number"
              className={`magic-input${calcStatus === 'correct' ? ' ok' : calcStatus === 'wrong' ? ' err' : ''}`}
              value={val}
              onChange={e => { setVal(e.target.value); setCalcStatus('idle'); }}
              onKeyDown={e => e.key === 'Enter' && val && calcStatus !== 'correct' && checkCalc()}
              placeholder="Escribe el resultado…"
              disabled={calcStatus === 'correct'}
              style={{ width:'100%', maxWidth:'220px', fontSize:'1.35rem', textAlign:'center', padding:'12px 18px' }}
            />
          </div>

          {calcStatus === 'correct' && faseIdx === 0 && (
            <div className="fb-ok anim-scaleIn">
              <span style={{ fontSize:'1.3rem' }}>🌟</span>
              <div>
                <p style={{ margin:'0 0 4px', fontWeight:700 }}>¡Perfecto! La operación era {fase.operacion_label} = {fase.resultado}.</p>
                <p style={{ margin:0, fontSize:'.88rem', opacity:.85 }}>Ahora resolvemos la segunda parte.</p>
              </div>
            </div>
          )}
          {calcStatus === 'correct' && faseIdx === 1 && (
            <div className="fb-ok anim-scaleIn">
              <span style={{ fontSize:'1.4rem' }}>🎉</span>
              <div>
                <p style={{ margin:'0 0 4px', fontWeight:700 }}>¡Excelente! La operación era {fase.operacion_label} = {fase.resultado}.</p>
                <p style={{ margin:0, fontSize:'.88rem', opacity:.85 }}>¡Has resuelto las dos partes!</p>
              </div>
            </div>
          )}

          {calcStatus === 'wrong' && (
            <>
              <div className="fb-err anim-scaleIn">
                <span style={{ fontSize:'1.2rem' }}>💫</span>
                <p style={{ margin:0 }}>Ese no es el resultado. Revisa tu operación en papel.</p>
              </div>
              {tries >= 2 && (
                <div className="fb-hint">
                  <span style={{ fontSize:'1.1rem' }}>💡</span>
                  <p style={{ margin:0, fontSize:'.88rem', fontStyle:'italic' }}>{fase.ayuda_calculo}</p>
                </div>
              )}
              <button className="btn-ghost" onClick={() => { setVal(''); setCalcStatus('idle'); }} style={{ width:'100%' }}>
                🔄 Intentar de nuevo
              </button>
            </>
          )}

          {calcStatus !== 'correct' && (
            <button className="btn-main" onClick={checkCalc} disabled={!val.trim()} style={{ padding:'14px' }}>
              ✓ Comprobar
            </button>
          )}
          {calcStatus === 'correct' && faseIdx === 0 && (
            <button className="btn-main anim-scaleIn" onClick={goToFase1} style={{ padding:'14px', background:'linear-gradient(135deg,#1A3D2A,#245A38)', borderColor:'#5CB85C' }}>
              Segunda parte →
            </button>
          )}
          {calcStatus === 'correct' && faseIdx === 1 && (
            <button className="btn-main anim-scaleIn" onClick={onNext} style={{ padding:'16px' }}>
              ¡Último paso! →
            </button>
          )}
        </>
      )}
    </div>
  );
}

// ── STEP: N-fase generalizado (tipo 'eleccion-multi') ────────
function StepCalculoMultiFases({ problem, onNext, onSave }) {
  const inputRef = React.useRef(null);
  const [faseIdx,     setFaseIdx]     = useState(0);
  const [prevResults, setPrevResults] = useState([]);
  const [opSel,    setOpSel]    = useState(null);
  const [opStatus, setOpStatus] = useState('idle');
  const [val,      setVal]      = useState('');
  const [calcStatus, setCalcStatus] = useState('idle');
  const [tries,    setTries]    = useState(0);
  const [subPhase, setSubPhase] = useState('op');

  const fase    = problem.fases[faseIdx];
  const isLast  = faseIdx === problem.fases.length - 1;
  const nFases  = problem.fases.length;

  React.useEffect(() => {
    if (subPhase === 'calc' && inputRef.current) inputRef.current.focus();
  }, [subPhase, faseIdx]);

  function pickOp(key) {
    if (opStatus === 'correct') return;
    setOpSel(key);
    setOpStatus(key === fase.operacion_correcta ? 'correct' : 'wrong');
  }

  function checkCalc() {
    const n = parseInt(val, 10);
    if (n === fase.resultado) {
      setCalcStatus('correct');
      if (isLast) onSave(n);
    } else {
      setCalcStatus('wrong');
      setTries(t => t + 1);
    }
  }

  function goToNextFase() {
    setPrevResults(r => [...r, fase.resultado]);
    setFaseIdx(i => i + 1);
    setOpSel(null); setOpStatus('idle');
    setVal(''); setCalcStatus('idle');
    setTries(0); setSubPhase('op');
  }

  // Phase indicator bar
  const PhaseBar = () => (
    <div style={{ display:'flex', gap:'8px', justifyContent:'center' }}>
      {problem.fases.map((_, i) => (
        <div key={i} style={{
          display:'flex', alignItems:'center', gap:'5px', padding:'5px 12px',
          borderRadius:'18px', fontSize:'.78rem', fontWeight:700,
          background: i < faseIdx ? 'linear-gradient(135deg,#1A3D2A,#245A38)'
                    : i === faseIdx ? 'linear-gradient(135deg,#7B1B1B,#9B2525)'
                    : 'rgba(196,147,58,.12)',
          color: i <= faseIdx ? '#F5E8C0' : '#7B1B1B',
          border: `1.5px solid ${i < faseIdx ? '#5CB85C' : i === faseIdx ? '#C4933A' : 'rgba(196,147,58,.3)'}`,
        }}>
          {i < faseIdx ? '✓' : `Parte ${i + 1}`}
        </div>
      ))}
    </div>
  );

  return (
    <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'18px' }}>
      <PhaseBar />

      {/* Current question */}
      <div style={{ background:'linear-gradient(135deg,#7B1B1B,#9B2525)', border:'2px solid #C4933A', borderRadius:'14px', padding:'16px 20px', textAlign:'center' }}>
        <p style={{ color:'#F5D080', fontSize:'1rem', fontWeight:700, margin:0, lineHeight:1.5 }}>{fase.pregunta}</p>
      </div>

      {/* Context from previous fase */}
      {faseIdx > 0 && (
        <div style={{ background:'rgba(92,184,92,.10)', border:'1.5px solid rgba(92,184,92,.4)', borderRadius:'10px', padding:'10px 14px', textAlign:'center' }}>
          <p style={{ color:'#1A3D2A', fontSize:'.88rem', margin:0 }}>
            📝 {fase.contexto || `Resultado anterior: ${prevResults[prevResults.length - 1]}`}
          </p>
        </div>
      )}

      {/* ── Operation choice ── */}
      {subPhase === 'op' && (
        <>
          <p style={{ color:'#4A2C0A', fontSize:'.92rem', fontWeight:700, textAlign:'center', margin:0 }}>¿Qué operación necesitas?</p>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px' }}>
            {OP_BUTTONS.map(op => {
              const isSel = opSel === op.key;
              const cls   = isSel ? (opStatus === 'correct' ? ' op-correct' : ' op-wrong') : '';
              return (
                <button key={op.key} className={`btn-op${cls}`} onClick={() => pickOp(op.key)}
                  disabled={opStatus === 'correct' && !isSel}
                  style={{ opacity: opStatus === 'correct' && !isSel ? .38 : 1 }}>
                  <div style={{ fontSize:'2rem', fontWeight:800, marginBottom:'4px', color: isSel ? 'inherit' : op.accent }}>{op.symbol}</div>
                  <div className="font-magic" style={{ fontSize:'.78rem', fontWeight:700, color: isSel ? 'inherit' : '#7B1B1B' }}>{op.label}</div>
                  <div style={{ fontSize:'.7rem', color: isSel ? 'inherit' : '#6B4A20', opacity:.85, marginTop:'2px' }}>{op.hint}</div>
                </button>
              );
            })}
          </div>
          {opStatus === 'correct' && (
            <div className="fb-ok anim-scaleIn">
              <span style={{ fontSize:'1.3rem' }}>✨</span>
              <div><p style={{ margin:0, fontWeight:700 }}>¡Correcto! Ahora haz la cuenta en papel.</p></div>
            </div>
          )}
          {opStatus === 'wrong' && (
            <>
              <div className="fb-err anim-scaleIn">
                <span style={{ fontSize:'1.2rem' }}>💫</span>
                <div>
                  <p style={{ margin:'0 0 3px', fontWeight:700 }}>Vamos a pensar de nuevo.</p>
                  <p style={{ margin:0, fontSize:'.88rem', opacity:.85 }}>{fase.ayuda_operacion}</p>
                </div>
              </div>
              <button className="btn-ghost" onClick={() => { setOpSel(null); setOpStatus('idle'); }} style={{ width:'100%' }}>🔄 Intentar de nuevo</button>
            </>
          )}
          {opStatus === 'correct' && (
            <button className="btn-main" onClick={() => setSubPhase('calc')} style={{ padding:'14px' }}>Hacer la cuenta →</button>
          )}
        </>
      )}

      {/* ── Calculation ── */}
      {subPhase === 'calc' && (
        <>
          <div style={{ background:'rgba(255,255,255,.65)', border:'2px dashed rgba(196,147,58,.55)', borderRadius:'14px', padding:'18px', textAlign:'center' }}>
            <p style={{ color:'#C4933A', fontSize:'.78rem', letterSpacing:'2px', margin:'0 0 8px', fontWeight:700 }}>✏️ MI OPERACIÓN EN PAPEL</p>
            <p style={{ color:'#B0A08A', fontSize:'.85rem', margin:0, fontStyle:'italic' }}>Escribe la operación en tu cuaderno y resuélvela.</p>
          </div>
          <div className="card" style={{ padding:'18px', textAlign:'center' }}>
            <p style={{ color:'#6B4A20', fontSize:'.9rem', margin:'0 0 12px', fontWeight:700 }}>¿Cuál es el resultado?</p>
            <input ref={inputRef} type="number"
              className={`magic-input${calcStatus === 'correct' ? ' ok' : calcStatus === 'wrong' ? ' err' : ''}`}
              value={val} onChange={e => { setVal(e.target.value); setCalcStatus('idle'); }}
              onKeyDown={e => e.key === 'Enter' && val && calcStatus !== 'correct' && checkCalc()}
              placeholder="Escribe el resultado…" disabled={calcStatus === 'correct'}
              style={{ width:'100%', maxWidth:'220px', fontSize:'1.35rem', textAlign:'center', padding:'12px 18px' }} />
          </div>

          {calcStatus === 'correct' && !isLast && (
            <div className="fb-ok anim-scaleIn">
              <span style={{ fontSize:'1.3rem' }}>🌟</span>
              <div>
                <p style={{ margin:'0 0 3px', fontWeight:700 }}>¡Perfecto! La operación era {fase.operacion_label} = {fase.resultado}.</p>
                <p style={{ margin:0, fontSize:'.88rem', opacity:.85 }}>Ahora resolvemos la parte {faseIdx + 2} de {nFases}.</p>
              </div>
            </div>
          )}
          {calcStatus === 'correct' && isLast && (
            <div className="fb-ok anim-scaleIn">
              <span style={{ fontSize:'1.4rem' }}>🎉</span>
              <div>
                <p style={{ margin:'0 0 3px', fontWeight:700 }}>¡Excelente! La operación era {fase.operacion_label} = {fase.resultado}.</p>
                <p style={{ margin:0, fontSize:'.88rem', opacity:.85 }}>¡Has completado todas las partes!</p>
              </div>
            </div>
          )}
          {calcStatus === 'wrong' && (
            <>
              <div className="fb-err anim-scaleIn">
                <span style={{ fontSize:'1.2rem' }}>💫</span>
                <p style={{ margin:0 }}>Ese no es el resultado. Revisa tu operación en papel.</p>
              </div>
              {tries >= 2 && (
                <div className="fb-hint">
                  <span style={{ fontSize:'1.1rem' }}>💡</span>
                  <p style={{ margin:0, fontSize:'.88rem', fontStyle:'italic' }}>{fase.ayuda_calculo}</p>
                </div>
              )}
              <button className="btn-ghost" onClick={() => { setVal(''); setCalcStatus('idle'); }} style={{ width:'100%' }}>🔄 Intentar de nuevo</button>
            </>
          )}
          {calcStatus !== 'correct' && (
            <button className="btn-main" onClick={checkCalc} disabled={!val.trim()} style={{ padding:'14px' }}>✓ Comprobar</button>
          )}
          {calcStatus === 'correct' && !isLast && (
            <button className="btn-main anim-scaleIn" onClick={goToNextFase} style={{ padding:'14px', background:'linear-gradient(135deg,#1A3D2A,#245A38)', borderColor:'#5CB85C' }}>
              Parte {faseIdx + 2} →
            </button>
          )}
          {calcStatus === 'correct' && isLast && (
            <button className="btn-main anim-scaleIn" onClick={onNext} style={{ padding:'16px' }}>¡Último paso! →</button>
          )}
        </>
      )}
    </div>
  );
}

      </div>

      <button className="btn-main" onClick={onNext} style={{ padding:'16px' }}>🗺️ ¡Comenzar el camino!</button>
    </div>
  );
}

  if (!ing) return null;
  const msgs = [
    '¡Has encontrado el total!',
    '¡La poción empieza a brillar!',
    '¡Lo estás haciendo genial!',
    '¡Mini poción lista! ¡Lo has logrado!',
  ];
  const msg = msgs[faseIdx] || '¡Ingrediente conseguido!';

  return (
    <div className="splash-overlay" style={{
      position:'fixed', inset:0, zIndex:9999,
      background:'radial-gradient(ellipse at center, rgba(42,16,80,.97) 0%, rgba(20,0,48,.99) 100%)',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      pointerEvents:'none',
    }}>
      {/* Pulsing ring behind emoji */}
      <div className="splash-ring" style={{
        position:'absolute',
        width:'160px', height:'160px', borderRadius:'50%',
        border:`3px solid ${ing.color}`,
        boxShadow:`0 0 30px ${ing.color}66`,
      }} />
      {/* Orbiting sparkles */}

        <span key={i} className="splash-spark" style={{
          position:'absolute', fontSize:sp.sz, animationDelay:sp.delay,
          '--tx': sp.tx, '--ty': sp.ty,
        }}>{sp.s}</span>
      ))}
      {/* Main emoji circle */}
      <div className="splash-emoji" style={{
        width:'130px', height:'130px', borderRadius:'50%',
        background:`radial-gradient(circle, ${ing.color}55 0%, ${ing.color}18 70%)`,
        border:`4px solid ${ing.color}`,
        boxShadow:`0 0 50px ${ing.color}99, 0 0 100px ${ing.color}44`,
        display:'flex', alignItems:'center', justifyContent:'center',
        fontSize:'4.2rem',
        marginBottom:'28px',
      }}>
        {ing.emoji}
      </div>
      {/* Text */}
      <p style={{ color:'#C86BDE', fontSize:'.72rem', letterSpacing:'3px', fontWeight:800,
                  margin:'0 0 8px', textTransform:'uppercase', textAlign:'center' }}>
        ¡Ingrediente conseguido!
      </p>
      <p className="font-magic" style={{ color:'#F0D8FF', fontSize:'1.55rem',
                                         margin:'0 0 12px', textAlign:'center',
                                         textShadow:`0 0 20px ${ing.color}` }}>
        {ing.nombre}
      </p>
      <p style={{ color:'rgba(240,216,255,.82)', fontSize:'1rem', textAlign:'center',
                  maxWidth:'270px', lineHeight:1.55, margin:'0 0 28px' }}>
        {msg}
      </p>
      {/* Progress dots */}
      <div style={{ display:'flex', gap:'10px' }}>
        {(problemIngredientes || INGREDIENTES_INFO).map((info, i) => (
          <div key={i} style={{
            width:'13px', height:'13px', borderRadius:'50%',
            background: i <= faseIdx ? info.color : 'rgba(200,107,222,.2)',
            boxShadow: i === faseIdx ? `0 0 10px ${info.color}` : 'none',
            transition:'background .3s',
          }} />
        ))}
      </div>
