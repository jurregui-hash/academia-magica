  );
}

// ── LECHUZA GUÍA ─────────────────────────────────────────
function OwlHint({ hints, resetKey }) {
  const [open,    setOpen]    = useState(false);
  const [hintIdx, setHintIdx] = useState(0);

  React.useEffect(() => {
    setOpen(false);
    setHintIdx(0);
  }, [resetKey]);

  if (!hints || hints.length === 0) return null;

  const idx     = Math.min(hintIdx, hints.length - 1);
  const current = hints[idx];
  const hasMore = idx < hints.length - 1;

  return (
    <div>
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          display:'flex', alignItems:'center', justifyContent:'center', gap:'8px',
          background: open ? 'rgba(196,147,58,.22)' : 'rgba(255,255,255,.55)',
          border:'1.5px solid rgba(196,147,58,.45)', borderRadius:'24px',
          padding:'9px 20px', cursor:'pointer', width:'100%',
          color:'#5A3A00', fontSize:'.9rem', fontWeight:700,
          fontFamily:'Nunito, sans-serif', transition:'background .2s',
        }}
      >
        <span style={{ fontSize:'1.25rem' }}>🦉</span>
        <span>{open ? 'Cerrar pista' : '¿Necesitas una pista?'}</span>
      </button>

      {open && (
        <div className="anim-fadeIn" style={{
          background:'linear-gradient(135deg,#2A1A00,#3A2A00)',
          border:'2px solid #C4933A', borderRadius:'16px',
          padding:'16px 18px', marginTop:'8px', position:'relative',
        }}>
          <div style={{
            position:'absolute', top:'-9px', left:'50%', transform:'translateX(-50%)',
            width:0, height:0,
            borderLeft:'9px solid transparent', borderRight:'9px solid transparent',
            borderBottom:'9px solid #C4933A',
          }} />
          <div style={{ display:'flex', gap:'12px', alignItems:'flex-start' }}>
            <span style={{ fontSize:'1.8rem', flexShrink:0, marginTop:'-2px' }}>🦉</span>
            <div style={{ flex:1 }}>
              <p style={{ color:'#F5D080', fontSize:'.93rem', margin:'0 0 12px', lineHeight:1.55, fontWeight:600 }}>
                {current}
              </p>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ color:'#C4933A', fontSize:'.72rem', opacity:.85 }}>
                  Pista {idx + 1} de {hints.length}
                </span>
                {hasMore ? (
                  <button
                    onClick={() => setHintIdx(i => i + 1)}
                    style={{
                      background:'rgba(196,147,58,.25)', border:'1px solid rgba(196,147,58,.55)',
                      borderRadius:'12px', padding:'5px 14px',
                      color:'#F5D080', fontSize:'.82rem', fontWeight:700,
                      cursor:'pointer', fontFamily:'Nunito, sans-serif',
                    }}
                  >
                    Otra pista →
                  </button>
                ) : (
                  <span style={{ color:'#A08050', fontSize:'.75rem', fontStyle:'italic' }}>
                    Última pista disponible
                  </span>
                )}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── STEP 3: Cálculo en cadena (tipo 'cadena') ────────────
function StepCalculoEncadenado({ problem, onNext, onSave, onFaseComplete }) {
  const inputRef = React.useRef(null);
  const [faseIdx,     setFaseIdx]     = useState(0);
  const [prevResults, setPrevResults] = useState([]);
  const [opSel,    setOpSel]    = useState(null);
  const [opStatus, setOpStatus] = useState('idle');
  const [val,      setVal]      = useState('');
  const [calcStatus, setCalcStatus] = useState('idle');
  const [tries,    setTries]    = useState(0);
  const [subPhase, setSubPhase] = useState('op'); // 'op' | 'calc' | 'connection'

  const fase   = problem.fases[faseIdx];
  const isLast = faseIdx === problem.fases.length - 1;
  const nFases = problem.fases.length;

  React.useEffect(() => {
    if (subPhase === 'calc' && inputRef.current) inputRef.current.focus();
  }, [subPhase, faseIdx]);

  function pickOp(key) {
    if (opStatus === 'correct') return;
    setOpSel(key);
    setOpStatus(key === fase.operacion_correcta ? 'correct' : 'wrong');
  }

  function checkCalc() {
    const n = parseInt(val, 10);
    if (n === fase.resultado) {
      setCalcStatus('correct');
      setPrevResults(r => [...r, n]);
      if (isLast) onSave(n);
      if (onFaseComplete) onFaseComplete(faseIdx);
    } else {
      setCalcStatus('wrong');
      setTries(t => t + 1);
    }
  }

  function goToNextFase() {
    setFaseIdx(i => i + 1);
    setOpSel(null); setOpStatus('idle');
    setVal(''); setCalcStatus('idle');
    setTries(0); setSubPhase('op');
  }

  const PhaseBar = () => (
    <div style={{ display:'flex', gap:'5px', justifyContent:'center', alignItems:'center' }}>
      {problem.fases.map((f, i) => (
        <React.Fragment key={i}>
          <div style={{
            width:'30px', height:'30px', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:'.75rem', fontWeight:800,
            background: i < faseIdx ? 'linear-gradient(135deg,#1A3D2A,#245A38)' : i === faseIdx ? 'linear-gradient(135deg,#7B1B1B,#9B2525)' : 'rgba(74,188,222,.1)',
            color: i <= faseIdx ? '#F5E8C0' : '#4ABCDE',
            border: `2px solid ${i < faseIdx ? '#5CB85C' : i === faseIdx ? '#C4933A' : 'rgba(74,188,222,.35)'}`,
          }}>
            {i < faseIdx ? '✓' : i + 1}
          </div>
          {i < nFases - 1 && (
            <div style={{ height:'2px', flex:1, maxWidth:'24px', background: i < faseIdx ? '#5CB85C' : 'rgba(196,147,58,.2)', borderRadius:'1px' }} />
          )}
        </React.Fragment>
      ))}
    </div>
  );

  // ── CONNECTION SCREEN ──────────────────────────────────
  if (subPhase === 'connection') {
    return (
      <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'16px' }}>
        <PhaseBar />

        <div className="fb-ok">
          <span style={{ fontSize:'1.3rem' }}>🌟</span>
          <div>
            <p style={{ margin:'0 0 3px', fontWeight:700 }}>¡Correcto! La operación era {fase.operacion_label} = {fase.resultado}{fase.fraccionFija || ''}.</p>
            <p style={{ margin:0, fontSize:'.88rem', opacity:.85 }}>{fase.mensajeConexion}</p>
          </div>
        </div>

        <div style={{ background:'linear-gradient(135deg,#0A2030,#102A3E)', border:'2px solid #4ABCDE', borderRadius:'16px', padding:'22px 20px', textAlign:'center', color:'#E8F8FF' }}>
          <p style={{ margin:'0 0 8px', fontSize:'.7rem', letterSpacing:'2px', opacity:.8, fontWeight:700 }}>📌 RESULTADO QUE GUARDO</p>
          <p className="font-magic" style={{ fontSize:'1.3rem', color:'#A8E8F8', margin:0, letterSpacing:'1px' }}>
            {fase.resultadoGuardado}
          </p>
        </div>

        <div style={{ background:'rgba(74,188,222,.08)', border:'1px solid rgba(74,188,222,.25)', borderRadius:'10px', padding:'11px 15px', textAlign:'center' }}>
          <p style={{ color:'#2A6A80', fontSize:'.88rem', margin:0, fontStyle:'italic' }}>
            Este resultado lo usarás en el siguiente paso.
          </p>
        </div>

        <button className="btn-main" onClick={goToNextFase}
          style={{ padding:'15px', background:'linear-gradient(135deg,#0A2030,#102A3E)', borderColor:'#4ABCDE', fontSize:'1rem' }}>
          💾 Guardar y pasar al paso {faseIdx + 2}
        </button>
      </div>
    );
  }

  // ── OP + CALC SCREEN ───────────────────────────────────
  return (
    <div className="anim-fadeIn" style={{ display:'flex', flexDirection:'column', gap:'16px' }}>
      <PhaseBar />

      {/* Current question */}
      <div style={{ background:'linear-gradient(135deg,#7B1B1B,#9B2525)', border:'2px solid #C4933A', borderRadius:'14px', padding:'15px 18px', textAlign:'center' }}>
        <p style={{ color:'#C4933A', fontSize:'.66rem', letterSpacing:'2px', margin:'0 0 5px' }}>PASO {faseIdx + 1} DE {nFases}</p>
        <p style={{ color:'#F5D080', fontSize:'1rem', fontWeight:700, margin:0, lineHeight:1.5 }}>{fase.pregunta}</p>
      </div>

      {/* RECORDATORIO KG → G */}
      {fase.conversionReminder && (
        <div style={{ background:'linear-gradient(135deg,#2A1A00,#3A2A00)', border:'2px solid #E5A83A', borderRadius:'14px', padding:'12px 18px', textAlign:'center', color:'#FFF3D0' }}>
          <p style={{ margin:'0 0 4px', fontSize:'.66rem', letterSpacing:'2px', opacity:.85, fontWeight:700 }}>⚖️ RECUERDA</p>
          <p className="font-magic" style={{ fontSize:'1.25rem', color:'#FFD060', margin:0, fontWeight:800 }}>{fase.conversionReminder}</p>
        </div>
      )}

      {/* DATO DEL PASO ANTERIOR */}
      {fase.datoUsado && (
        <div style={{ background:'linear-gradient(135deg,#0A2030,#102A3E)', border:'2px solid #4ABCDE', borderRadius:'14px', padding:'14px 18px', textAlign:'center', color:'#E8F8FF' }}>
          <p style={{ margin:'0 0 5px', fontSize:'.68rem', letterSpacing:'2px', opacity:.8, fontWeight:700 }}>📌 DATO QUE USO DEL PASO ANTERIOR</p>
          <p className="font-magic" style={{ fontSize:'1.1rem', color:'#A8E8F8', margin:0, whiteSpace:'pre-line', lineHeight:1.6 }}>
            {fase.datoUsado}
          </p>
        </div>
      )}

      {/* DATO QUE RECUPERO DEL INICIO */}
      {fase.datoInicio && (
        <div style={{ background:'linear-gradient(135deg,#2A1000,#3A1A00)', border:'2px solid #E5803A', borderRadius:'14px', padding:'14px 18px', textAlign:'center', color:'#FFF0E0' }}>
          <p style={{ margin:'0 0 5px', fontSize:'.68rem', letterSpacing:'2px', opacity:.8, fontWeight:700 }}>🔙 DATO QUE RECUPERO DEL INICIO</p>
          <p className="font-magic" style={{ fontSize:'1.1rem', color:'#FFB870', margin:0, whiteSpace:'pre-line', lineHeight:1.6 }}>
            {fase.datoInicio}
          </p>
        </div>
      )}

      {/* ALERTA PEDAGÓGICA */}
      {fase.datoAlert && (
        <div style={{ background:'rgba(180,60,30,.1)', border:'1.5px solid rgba(180,60,30,.35)', borderRadius:'10px', padding:'11px 15px' }}>
          <p style={{ color:'#7B2A10', fontSize:'.88rem', margin:0, fontStyle:'italic', lineHeight:1.5 }}>
            ⚠️ {fase.datoAlert}
          </p>
        </div>
      )}

      {/* LECHUZA GUÍA */}
      <OwlHint hints={fase.hints} resetKey={faseIdx} />

      {/* ── Elegir operación ── */}
      {subPhase === 'op' && (
        <>
          <p style={{ color:'#4A2C0A', fontSize:'.92rem', fontWeight:700, textAlign:'center', margin:0 }}>¿Qué operación necesitas?</p>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px' }}>
            {OP_BUTTONS.filter(op => op.key !== 'fraccion' || !!fase.fraccionGuia).map(op => {
              const isSel = opSel === op.key;
              const cls   = isSel ? (opStatus === 'correct' ? ' op-correct' : ' op-wrong') : '';
              return (
                <button key={op.key} className={`btn-op${cls}`} onClick={() => pickOp(op.key)}
                  disabled={opStatus === 'correct' && !isSel}
                  style={{ opacity: opStatus === 'correct' && !isSel ? .38 : 1, ...(op.key === 'fraccion' ? { gridColumn:'1 / -1' } : {}) }}>
                  <div style={{ fontSize:'2rem', fontWeight:800, marginBottom:'4px', color: isSel ? 'inherit' : op.accent }}>{op.symbol}</div>
                  <div className="font-magic" style={{ fontSize:'.78rem', fontWeight:700, color: isSel ? 'inherit' : '#7B1B1B' }}>{op.label}</div>
                  <div style={{ fontSize:'.7rem', color: isSel ? 'inherit' : '#6B4A20', opacity:.85, marginTop:'2px' }}>{op.hint}</div>
                </button>
              );
            })}
          </div>
          {opStatus === 'correct' && (
            <div className="fb-ok anim-scaleIn">
              <span style={{ fontSize:'1.2rem' }}>✨</span>
              <p style={{ margin:0, fontWeight:700 }}>¡Correcto! Ahora haz la cuenta en papel.</p>
            </div>
          )}
          {opStatus === 'wrong' && (
            <>
              <div className="fb-err anim-scaleIn">
                <span style={{ fontSize:'1.2rem' }}>💫</span>
                <div>
                  <p style={{ margin:'0 0 3px', fontWeight:700 }}>Vamos a pensar de nuevo.</p>
                  <p style={{ margin:0, fontSize:'.88rem', opacity:.85 }}>{fase.ayuda_operacion}</p>
                </div>
              </div>
              <button className="btn-ghost" onClick={() => { setOpSel(null); setOpStatus('idle'); }} style={{ width:'100%' }}>🔄 Intentar de nuevo</button>
            </>
          )}
          {opStatus === 'correct' && (
            <button className="btn-main" onClick={() => setSubPhase('calc')} style={{ padding:'14px' }}>Hacer la cuenta →</button>
          )}
        </>
      )}

      {/* ── Cálculo ── */}
      {subPhase === 'calc' && (
        <>
          {fase.fraccionGuia && (
            <div style={{ background:'linear-gradient(135deg,#1A003A,#2A1050)', border:'2px solid #C86BDE', borderRadius:'14px', padding:'14px 18px', color:'#F0D8FF' }}>
              <p style={{ margin:'0 0 8px', fontSize:'.68rem', letterSpacing:'2px', opacity:.85, fontWeight:700, textAlign:'center' }}>⅓ CÓMO CALCULAR UNA FRACCIÓN</p>
              <ol style={{ margin:0, paddingLeft:'20px', fontSize:'.85rem', lineHeight:1.8, color:'#E0C0FF' }}>
                <li>Mira el <strong style={{ color:'#C86BDE' }}>número de abajo</strong>: en cuántas partes iguales divides el total.</li>
                <li>Divide el total entre ese número.</li>
                <li>Mira el <strong style={{ color:'#C86BDE' }}>número de arriba</strong>: cuántas partes necesitas.</li>
                <li>Multiplica por ese número.</li>
              </ol>
              <p style={{ margin:'8px 0 0', fontSize:'.78rem', color:'#C86BDE', textAlign:'center', fontStyle:'italic' }}>{fase.fraccionGuia}</p>
            </div>
          )}
          <div style={{ background:'rgba(255,255,255,.65)', border:'2px dashed rgba(196,147,58,.55)', borderRadius:'14px', padding:'16px', textAlign:'center' }}>
            <p style={{ color:'#C4933A', fontSize:'.75rem', letterSpacing:'2px', margin:'0 0 6px', fontWeight:700 }}>✏️ MI OPERACIÓN EN PAPEL</p>
            <p style={{ color:'#B0A08A', fontSize:'.83rem', margin:0, fontStyle:'italic' }}>Hazlo en tu papel y escribe aquí el resultado.</p>
          </div>
          <div className="card" style={{ padding:'16px', textAlign:'center' }}>
            <p style={{ color:'#6B4A20', fontSize:'.9rem', margin:'0 0 12px', fontWeight:700 }}>
              {fase.fraccionFija ? '¿Cuál es el numerador (número de arriba)?' : '¿Cuál es el resultado?'}
            </p>
            {fase.fraccionFija ? (
              <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:'4px' }}>
                <input ref={inputRef} type="number"
                  className={`magic-input${calcStatus === 'correct' ? ' ok' : calcStatus === 'wrong' ? ' err' : ''}`}
                  value={val} onChange={e => { setVal(e.target.value); setCalcStatus('idle'); }}
                  onKeyDown={e => e.key === 'Enter' && val && calcStatus !== 'correct' && checkCalc()}
                  placeholder="?" disabled={calcStatus === 'correct'}
                  style={{ width:'80px', fontSize:'1.6rem', textAlign:'center', padding:'10px 8px' }} />
                <span style={{ fontSize:'1.6rem', fontWeight:900, color:'#7B1B1B', letterSpacing:'-1px', lineHeight:1 }}>{fase.fraccionFija}</span>
              </div>
            ) : (
              <input ref={inputRef} type="number"
                className={`magic-input${calcStatus === 'correct' ? ' ok' : calcStatus === 'wrong' ? ' err' : ''}`}
                value={val} onChange={e => { setVal(e.target.value); setCalcStatus('idle'); }}
                onKeyDown={e => e.key === 'Enter' && val && calcStatus !== 'correct' && checkCalc()}
                placeholder="Escribe el resultado…" disabled={calcStatus === 'correct'}
                style={{ width:'100%', maxWidth:'220px', fontSize:'1.35rem', textAlign:'center', padding:'12px 18px' }} />
            )}
          </div>

          {calcStatus === 'correct' && !isLast && (
            <div className="fb-ok anim-scaleIn">
              <span style={{ fontSize:'1.2rem' }}>🌟</span>
              <p style={{ margin:0, fontWeight:700 }}>¡Correcto! Resultado: {fase.resultado}{fase.fraccionFija || ''}.</p>
            </div>
          )}
          {calcStatus === 'correct' && isLast && (
            <div className="fb-ok anim-scaleIn">
              <span style={{ fontSize:'1.4rem' }}>🎉</span>
              <div>
                <p style={{ margin:'0 0 3px', fontWeight:700 }}>¡Excelente! La operación era {fase.operacion_label} = {fase.resultado}{fase.fraccionFija || ''}.</p>
                <p style={{ margin:0, fontSize:'.88rem', opacity:.85 }}>¡Has completado todos los pasos!</p>
              </div>
            </div>
          )}
          {calcStatus === 'wrong' && (
            <>
              <div className="fb-err anim-scaleIn">
                <span style={{ fontSize:'1.2rem' }}>💫</span>
                <p style={{ margin:0 }}>Ese no es el resultado. Revisa tu operación en papel.</p>
              </div>
              {tries >= 2 && (
                <div className="fb-hint anim-scaleIn">
                  <span style={{ fontSize:'1.1rem' }}>💡</span>
                  <p style={{ margin:0, fontSize:'.88rem', fontStyle:'italic' }}>{fase.ayuda_calculo}</p>
                </div>
              )}
              <button className="btn-ghost" onClick={() => { setVal(''); setCalcStatus('idle'); }} style={{ width:'100%' }}>🔄 Intentar de nuevo</button>
            </>
          )}
          {calcStatus !== 'correct' && (
            <button className="btn-main" onClick={checkCalc} disabled={!val.trim()} style={{ padding:'14px' }}>✓ Comprobar</button>
          )}
          {calcStatus === 'correct' && !isLast && (
            <button className="btn-main anim-scaleIn" onClick={() => setSubPhase('connection')}
              style={{ padding:'14px', background:'linear-gradient(135deg,#0A2030,#102A3E)', borderColor:'#4ABCDE' }}>
              📌 Ver resultado guardado →
            </button>
          )}
          {calcStatus === 'correct' && isLast && (
            <button className="btn-main anim-scaleIn" onClick={onNext} style={{ padding:'16px' }}>¡Último paso! →</button>
          )}
        </>
      )}
    </div>
  );
}

// Panel de resultados guardados — se va llenando fase a fase
function ResultadosGuardados12({ guardados }) {
  const [open, setOpen] = React.useState(true);
  if (!guardados || guardados.length === 0) return null;
  return (
    <div style={{ background:'rgba(123,27,27,.04)', border:'1px solid rgba(123,27,27,.18)', borderRadius:'12px', overflow:'hidden' }}>
      <button onClick={() => setOpen(v => !v)} style={{
        width:'100%', padding:'10px 14px', background:'none', border:'none',
        display:'flex', alignItems:'center', justifyContent:'space-between', cursor:'pointer',
      }}>
        <span style={{ color:'#7B1B1B', fontSize:'.75rem', fontWeight:700, letterSpacing:'1px' }}>
          📋 GUARDADO ({guardados.length})
        </span>
        <span style={{ color:'#C4933A', fontSize:'.8rem' }}>{open ? '▲' : '▼'}</span>
      </button>
      {open && (
        <div style={{ padding:'0 14px 12px', display:'flex', flexDirection:'column', gap:'4px' }}>
          {guardados.map((g, i) => (
            <p key={i} style={{ margin:'2px 0', fontSize:'.83rem', color:'#1A5A2A', fontWeight:700 }}>✓ {g}</p>
          ))}
        </div>
      )}
    </div>
  );
}

// Cálculo — número input, sin mostrar la operación
function StepCalcDia12({ fase, enunciado, onCorrect }) {
  const [val, setVal]     = React.useState('');
  const [status, setStatus] = React.useState('idle');
  const [tries, setTries] = React.useState(0);
  const [showEnunciado, setShowEnunciado] = React.useState(false);
  const inputRef = React.useRef(null);
  React.useEffect(() => { setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 80); }, []);

  function check() {
    const n = parseInt(val, 10);
    if (n === fase.resultado) { setStatus('correct'); setTimeout(onCorrect, 900); }
    else { setTries(t => t+1); setStatus('wrong'); }
  }
  const errMsg = tries <= 1 ? 'Ese no es. Revisa tu cálculo.'
    : tries === 2 ? 'Vamos a revisarlo con calma.'
    : 'Puedes pedir una pista a la lechuza.';

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
      <button className="btn-ghost" onClick={() => setShowEnunciado(v => !v)} style={{ width:'100%', fontSize:'.82rem' }}>
        📖 {showEnunciado ? 'Ocultar el problema' : 'Volver a leer el problema'}
      </button>
      {showEnunciado && (
        <div className="card anim-fadeIn" style={{ padding:'14px', whiteSpace:'pre-line', background:'rgba(255,251,240,.95)' }}>
          <p style={{ color:'#4A2C0A', lineHeight:1.7, margin:0, fontSize:'.88rem' }}>{enunciado}</p>
        </div>
      )}
      {fase.contexto && (
        <div style={{ background:'rgba(196,147,58,.08)', border:'1px solid rgba(196,147,58,.3)', borderRadius:'12px', padding:'12px 14px' }}>

// Orquestador de fases — Día 12
function StepDia12({ problem, onIngrediente, onComplete }) {
  const [faseIdx, setFaseIdx] = React.useState(0);
  const [completados, setCompletados] = React.useState({});
  const [showFinal, setShowFinal] = React.useState(false);

  const fase = problem.fases[faseIdx];
  const isLastFase = faseIdx === problem.fases.length - 1;

  const guardados = problem.fases
    .map((f, i) => (i in completados && f.guardado) ? f.guardado : null)
    .filter(Boolean);

  function handleFaseComplete() {
    const valor = fase.guardado || '✓';
    setCompletados(prev => ({...prev, [faseIdx]: valor}));
    if (fase.ingredienteIdx !== undefined) onIngrediente(fase.ingredienteIdx);
    if (isLastFase) setShowFinal(true);
    else setFaseIdx(i => i + 1);
  }

  function goBack() { setFaseIdx(i => Math.max(0, i - 1)); }

  const yaCompleto = faseIdx in completados;

  const FaseHeader = () => (
    <>
      <div style={{ display:'flex', justifyContent:'center', gap:'6px', alignItems:'center', flexWrap:'wrap' }}>
        {problem.fases.map((f, i) => (
          <div key={i} style={{
            width:'26px', height:'26px', borderRadius:'50%',
            background: i in completados ? '#5CB85C' : i === faseIdx ? '#7B1B1B' : 'rgba(123,27,27,.12)',
            color: (i in completados || i === faseIdx) ? '#fff' : '#9CA3AF',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:'.62rem', fontWeight:800,
          }}>{i in completados ? '✓' : i + 1}</div>
        ))}
      </div>
      {faseIdx > 0 && !showFinal && (
        <button className="btn-ghost" onClick={goBack} style={{ width:'100%', fontSize:'.82rem' }}>
          ← Volver al paso anterior
        </button>
      )}
      <ResultadosGuardados12 guardados={guardados} />
    </>
  );

  if (showFinal) {
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
        <ResultadosGuardados12 guardados={guardados} />
        <div className="fb-ok" style={{ flexDirection:'column', gap:'10px', padding:'20px 18px' }}>
          <span style={{ fontSize:'1.8rem' }}>🏆</span>
          <div style={{ textAlign:'center' }}>
            <p style={{ margin:'0 0 6px', fontWeight:800, fontSize:'1rem' }}>¡Problema completado!</p>
            <p style={{ margin:0, lineHeight:1.55, fontSize:'.95rem' }}>{problem.respuestaFinal}</p>
          </div>
        </div>
        <button className="btn-main" onClick={onComplete} style={{ padding:'14px' }}>
          → Continuar a la Mesa de Pociones
        </button>
      </div>
    );
  }

  if (yaCompleto) {
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
        <FaseHeader />
        <div className="card" style={{
          padding:'16px', textAlign:'center',
          background:'rgba(90,180,90,.06)', border:'2px solid rgba(90,180,90,.35)',
        }}>
          <p style={{ color:'#7B1B1B', fontSize:'.7rem', letterSpacing:'1.5px', fontWeight:700, margin:'0 0 8px', textTransform:'uppercase' }}>
            ✓ Paso ya resuelto
          </p>
          <p style={{ color:'#4A2C0A', fontSize:'.9rem', margin:'0 0 6px', fontWeight:600 }}>{fase.pregunta}</p>
          <p style={{ color:'#1A5A2A', fontSize:'1rem', fontWeight:800, margin:0 }}>{completados[faseIdx]}</p>
        </div>
        <button className="btn-main" onClick={() => setFaseIdx(i => i + 1)} style={{ padding:'14px' }}>
          → Ir al paso {faseIdx + 2}
        </button>
      </div>
    );
  }

  const renderFase = () => {
    const props = { key: faseIdx, fase, enunciado: problem.enunciado, onCorrect: handleFaseComplete };
    switch (fase.tipo) {
      case 'calculo':         return <StepCalcDia12 {...props} />;
      case 'confirmar-datos': return <StepConfirmarDatos12 {...props} />;
      case 'sino':            return <StepSiNoDia12 {...props} />;
      case 'comprobar':       return <StepSiNoDia12 {...props} />;
      case 'porque':          return <StepPorqueDia12 {...props} />;
      default:                return null;
    }
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
      <FaseHeader />
      {renderFase()}
    </div>
  );
}

// Lechuza guía con pistas progresivas
function LechuzaDia11({ hints }) {
  const [open, setOpen] = React.useState(false);
  const [idx, setIdx] = React.useState(0);
  if (!hints || hints.length === 0) return null;
  return (
    <div>
      {!open ? (
        <button className="btn-ghost" onClick={() => setOpen(true)}
          style={{ width:'100%', fontSize:'.85rem', borderColor:'#8B5CF6', color:'#8B5CF6' }}>

          </div>
          <div style={{ display:'flex', gap:'8px', alignSelf:'flex-end' }}>

          </div>
        </div>
      )}
    </div>
  );
}

// "Tacha los datos que no necesitas" mechanic
function StepTachaDatos({ datos, hints, enunciado, onCorrect }) {
  const [tachados, setTachados] = React.useState(new Set());
  const [status, setStatus]     = React.useState('idle');
  const [tries, setTries]       = React.useState(0);
  const [showEnunciado, setShowEnunciado] = React.useState(false);

  function toggle(i) {
    setTachados(prev => {
      const next = new Set(prev);
      if (next.has(i)) next.delete(i); else next.add(i);
      return next;
    });
    setStatus('idle');
  }

  function comprobar() {
    const correcto = datos.every((d, i) => (!d.necesario) === tachados.has(i));
    if (correcto) {
      onCorrect();
    } else {
      setTries(t => t+1);
      setStatus('error');
    }
  }

  const errMsg = tries <= 1
    ? 'Vamos a mirarlo otra vez. ¿Qué te preguntan exactamente?'
    : tries === 2
    ? 'Casi. Mira otra vez qué datos sirven para responder la pregunta.'
    : 'Piensa qué te están preguntando antes de tachar. ¿Hay algún dato que distrae?';

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
      <button className="btn-ghost" onClick={() => setShowEnunciado(v => !v)}
        style={{ width:'100%', fontSize:'.82rem' }}>
        📖 {showEnunciado ? 'Ocultar el problema' : 'Volver a leer el problema'}
      </button>
      {showEnunciado && (
        <div className="card anim-fadeIn" style={{ padding:'14px', background:'rgba(255,251,240,.95)', whiteSpace:'pre-line' }}>
          <p style={{ color:'#4A2C0A', lineHeight:1.7, margin:0, fontSize:'.88rem' }}>{enunciado}</p>
        </div>
      )}

      <div className="card" style={{ padding:'14px', textAlign:'center' }}>
        <p style={{ color:'#7B1B1B', fontSize:'.75rem', letterSpacing:'2px', fontWeight:700, margin:'0 0 6px', textTransform:'uppercase' }}>🗑️ Tacha los datos que no necesitas</p>
        <p style={{ color:'#4A2C0A', fontSize:'.88rem', margin:0, lineHeight:1.5 }}>
          Pulsa los datos que <strong>NO</strong> necesitas para responder.<br/>
          <span style={{ opacity:.7, fontStyle:'italic', fontSize:'.82rem' }}>Pulsa otra vez para desmarcarlo.</span>
        </p>
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
        {datos.map((d, i) => {
          const tachado = tachados.has(i);
          return (
            <button key={i} onClick={() => toggle(i)} style={{
              background: tachado ? 'rgba(150,150,150,.1)' : 'linear-gradient(135deg,#FEFBF0,#F5E8BF)',
              border: `2px solid ${tachado ? '#9CA3AF' : '#C4933A'}`,
              borderRadius:'14px', padding:'14px 16px',
              display:'flex', alignItems:'center', gap:'12px',
              cursor:'pointer', transition:'all .2s', textAlign:'left',
            }}>
              <span style={{ fontSize:'1.3rem', opacity: tachado ? .4 : 1, flexShrink:0 }}>
                {tachado ? '✗' : '◉'}
              </span>
              <span style={{
                color: tachado ? '#9CA3AF' : '#4A2C0A',
                fontWeight: tachado ? 400 : 700,
                fontSize:'.92rem',
                textDecoration: tachado ? 'line-through' : 'none',
                transition:'all .2s',
              }}>{d.texto}</span>
            </button>
          );
        })}
      </div>

      {status === 'error' && (
        <div className="fb-err anim-scaleIn">
          <span style={{ fontSize:'1.1rem' }}>💫</span>
          <p style={{ margin:0 }}>{errMsg}</p>
        </div>
      )}

      <LechuzaDia11 hints={hints} />

      <button className="btn-main" onClick={comprobar} style={{ padding:'14px' }}>
        ✓ Comprobar datos
      </button>
    </div>
  );
}

// Cálculo sin mostrar operación — usado en días 11
function StepCalcDia11({ pregunta, resultado, hints, enunciado, onCorrect }) {
  const [val, setVal]     = React.useState('');
  const [status, setStatus] = React.useState('idle');
  const [tries, setTries] = React.useState(0);
  const [showEnunciado, setShowEnunciado] = React.useState(false);
  const inputRef = React.useRef(null);

  React.useEffect(() => { setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 80); }, []);

  function check() {
    const n = parseInt(val, 10);
    if (n === resultado) {
      setStatus('correct');
      setTimeout(onCorrect, 900);
    } else {
      setTries(t => t+1);
      setStatus('wrong');
    }
  }

  const errMsg = tries === 0 ? 'Ese no es. Revisa tu cálculo.'
    : tries === 1 ? 'Vamos a revisarlo con calma.'
    : tries === 2 ? 'Casi. Mira otra vez los datos importantes.'
    : 'Puedes pedir una pista a la lechuza.';

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
      <button className="btn-ghost" onClick={() => setShowEnunciado(v => !v)}
        style={{ width:'100%', fontSize:'.82rem' }}>
        📖 {showEnunciado ? 'Ocultar el problema' : 'Volver a leer el problema'}
      </button>
      {showEnunciado && (
        <div className="card anim-fadeIn" style={{ padding:'14px', background:'rgba(255,251,240,.95)', whiteSpace:'pre-line' }}>
          <p style={{ color:'#4A2C0A', lineHeight:1.7, margin:0, fontSize:'.88rem' }}>{enunciado}</p>
        </div>
      )}

      <div className="card" style={{ padding:'16px', textAlign:'center' }}>
        <p style={{ color:'#4A2C0A', fontSize:'1rem', margin:0, fontWeight:700, lineHeight:1.6 }}>{pregunta}</p>
      </div>

      <div style={{ background:'rgba(255,255,255,.65)', border:'2px dashed rgba(196,147,58,.55)', borderRadius:'14px', padding:'14px', textAlign:'center' }}>
        <p style={{ color:'#C4933A', fontSize:'.75rem', letterSpacing:'2px', margin:'0 0 4px', fontWeight:700 }}>✏️ HAZLO EN TU PAPEL</p>
        <p style={{ color:'#B0A08A', fontSize:'.83rem', margin:0, fontStyle:'italic' }}>Piensa qué operación necesitas y resuélvela en papel.</p>
      </div>

      <div className="card" style={{ padding:'16px', textAlign:'center' }}>
        <p style={{ color:'#6B4A20', fontSize:'.9rem', margin:'0 0 10px', fontWeight:700 }}>¿Cuál es el resultado?</p>
        <input ref={inputRef} type="number"
          className={`magic-input${status === 'correct' ? ' ok' : status === 'wrong' ? ' err' : ''}`}
          value={val} onChange={e => { setVal(e.target.value); setStatus('idle'); }}
          onKeyDown={e => e.key === 'Enter' && val && status !== 'correct' && check()}
          placeholder="?" disabled={status === 'correct'}
          style={{ width:'100%', maxWidth:'200px', fontSize:'1.8rem', textAlign:'center' }} />
      </div>

      {status === 'correct' && (
        <div className="fb-ok anim-scaleIn">
          <span style={{ fontSize:'1.2rem' }}>🌟</span>
          <p style={{ margin:0 }}>¡Correcto! El resultado es {resultado}.</p>
        </div>
      )}
      {status === 'wrong' && (
        <>
          <div className="fb-err anim-scaleIn">
            <span style={{ fontSize:'1.2rem' }}>💫</span>
            <p style={{ margin:0 }}>{errMsg}</p>
          </div>
          <button className="btn-ghost" onClick={() => { setVal(''); setStatus('idle'); }} style={{ width:'100%' }}>
            🔄 Intentarlo otra vez
          </button>
        </>
      )}

      <LechuzaDia11 hints={hints} />

      {status !== 'correct' && (
        <button className="btn-main" onClick={check} disabled={!val.trim()} style={{ padding:'14px' }}>
          ✓ Comprobar
        </button>
      )}
    </div>
  );
}

// Orquestador de problemas ENCADENADOS
function StepDia11Encadenado({ problem, onIngrediente }) {
  const [fase, setFase]         = React.useState(0); // 0=enunciado, 1..N=pasos
  const [completados, setCompletados] = React.useState({}); // { pasoIdx: resultado }
  const pasos = problem.pasos;

  if (fase === 0) {
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
        <div className="card" style={{ padding:'18px', whiteSpace:'pre-line' }}>
          <p style={{ color:'#4A2C0A', lineHeight:1.75, margin:0, fontSize:'.95rem' }}>{problem.enunciado}</p>
        </div>
        <div style={{ background:'rgba(123,27,27,.06)', border:'1px solid rgba(123,27,27,.18)', borderRadius:'14px', padding:'14px 16px' }}>
          <p style={{ color:'#7B1B1B', fontWeight:700, margin:'0 0 8px', fontSize:'.85rem', letterSpacing:'.5px' }}>
            Para resolver este problema averiguarás:
          </p>
          {pasos.map((p, i) => (
            <p key={i} style={{ margin:'4px 0', fontSize:'.85rem', color:'#4A2C0A',
              fontWeight: i in completados ? 600 : 400,
            }}>
              {i in completados ? '✓ ' : `${i+1}. `}{p.tipo === 'final' ? p.texto : p.pregunta}
            </p>
          ))}
        </div>
        <button className="btn-main" onClick={() => setFase(1)} style={{ padding:'14px' }}>
          {Object.keys(completados).length > 0 ? '→ Continuar donde lo dejé' : '¡Empezar! →'}
        </button>
      </div>
    );
  }

  const pasoIdx = fase - 1;
  const paso    = pasos[pasoIdx];
  const isLast  = pasoIdx === pasos.length - 1;
  const yaCompleto = pasoIdx in completados;

  function handlePasoComplete() {
    setCompletados(prev => ({...prev, [pasoIdx]: paso.tipo === 'final' ? paso.texto : paso.resultado}));
    onIngrediente(pasoIdx);
    if (!isLast) setFase(f => f + 1);
  }

  // Shared header for all pasos
  const PasoHeader = () => (
    <>
      {/* Step dots */}
      <div style={{ display:'flex', justifyContent:'center', gap:'8px', alignItems:'center' }}>
        {pasos.map((_, i) => (
          <div key={i} style={{
            width:'30px', height:'30px', borderRadius:'50%',
            background: i in completados ? '#5CB85C' : i === pasoIdx ? '#7B1B1B' : 'rgba(123,27,27,.12)',
            color: (i in completados || i === pasoIdx) ? '#fff' : '#9CA3AF',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:'.75rem', fontWeight:800, transition:'all .3s',
          }}>{i in completados ? '✓' : i+1}</div>
        ))}
      </div>
      {/* Back navigation */}
      <button className="btn-ghost" onClick={() => setFase(f => Math.max(0, f-1))}
        style={{ width:'100%', fontSize:'.82rem' }}>
        ← {fase === 1 ? 'Volver a leer el problema' : 'Volver al paso anterior'}
      </button>
    </>
  );

  // ── Ya completado: mostrar resultado guardado y botón de continuar ──
  if (yaCompleto) {
    const guardado = completados[pasoIdx];
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
        <PasoHeader />
        <div className="card anim-scaleIn" style={{ padding:'16px', textAlign:'center', background:'rgba(90,180,90,.06)', border:'2px solid rgba(90,180,90,.35)' }}>
          <p style={{ color:'#7B1B1B', fontSize:'.72rem', letterSpacing:'1.5px', fontWeight:700, margin:'0 0 8px', textTransform:'uppercase' }}>
            ✓ Paso ya resuelto
          </p>
          <p style={{ color:'#4A2C0A', fontSize:'.9rem', margin:'0 0 4px', fontWeight:600, lineHeight:1.5 }}>
            {paso.tipo === 'final' ? paso.texto : paso.pregunta}
          </p>
          {paso.tipo !== 'final' && (
            <p style={{ color:'#1A5A2A', fontSize:'1.2rem', fontWeight:800, margin:'6px 0 0' }}>
              Resultado: {guardado}
            </p>
          )}
        </div>
        {!isLast && (
          <button className="btn-main" onClick={() => setFase(f => f + 1)} style={{ padding:'14px' }}>
            → Ir al paso {pasoIdx + 2}
          </button>
        )}
      </div>
    );
  }

  // ── Paso activo ──
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
      <PasoHeader />
      {paso.tipo === 'final' ? (
        <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
          <div className="fb-ok" style={{ flexDirection:'column', alignItems:'flex-start', gap:'8px' }}>
            <span style={{ fontSize:'1.4rem' }}>🏆</span>
            <div>
              <p style={{ margin:'0 0 4px', fontWeight:800, fontSize:'1rem' }}>¡Respuesta final!</p>
              <p style={{ margin:0, lineHeight:1.5 }}>{paso.texto}</p>
            </div>
          </div>
          <button className="btn-main" onClick={handlePasoComplete} style={{ padding:'14px' }}>
            ✓ ¡Confirmar respuesta!
          </button>
        </div>
      ) : (
        <StepCalcDia11
          key={`paso-${pasoIdx}`}
          pregunta={paso.pregunta}
          resultado={paso.resultado}
          hints={paso.hints}
          enunciado={problem.enunciado}
          onCorrect={handlePasoComplete}
        />
      )}
    </div>
  );
}

// Orquestador de problemas CON TRAMPA
function StepDia11Trampa({ problem, onIngrediente }) {
  const [phase, setPhase] = React.useState(0);
  // 0=enunciado, 1=tachar, 2=pregunta_clara, 3=calculo, 4=respuesta_final
  // Memoria de fases completadas: { 1: 'tachar_ok', 3: resultado }
  const [completados, setCompletados] = React.useState({});

  function goBack() { setPhase(p => Math.max(0, p-1)); }

  const BackBtn = () => phase > 0 ? (
    <button className="btn-ghost" onClick={goBack} style={{ width:'100%', fontSize:'.82rem' }}>
      ← {phase === 1 ? 'Volver a leer el problema' : 'Volver al paso anterior'}
    </button>
  ) : null;

  if (phase === 0) {
    const hayProgreso = Object.keys(completados).length > 0;
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
        <div className="card" style={{ padding:'18px', whiteSpace:'pre-line' }}>
          <p style={{ color:'#4A2C0A', lineHeight:1.75, margin:0, fontSize:'.95rem' }}>{problem.enunciado}</p>
        </div>
        <div style={{ background:'rgba(196,147,58,.08)', border:'1px solid rgba(196,147,58,.3)', borderRadius:'14px', padding:'14px 16px', textAlign:'center' }}>
          <p style={{ color:'#7B1B1B', fontWeight:700, margin:'0 0 4px', fontSize:'.88rem' }}>
            🔍 En este problema hay datos que no necesitas.
          </p>
          <p style={{ color:'#6B4A20', margin:0, fontSize:'.83rem', fontStyle:'italic' }}>
            Lee con mucha atención antes de calcular.
          </p>
        </div>
        <button className="btn-main" onClick={() => setPhase(1)} style={{ padding:'14px' }}>
          {hayProgreso ? '→ Continuar donde lo dejé' : '¡Empezar! →'}
        </button>
      </div>
    );
  }

  // ── Phase 1: Tachar datos ──
  if (phase === 1) {
    // Si ya completado: mostrar resumen y avanzar
    if (1 in completados) {
      const correctos = problem.datos.filter(d => !d.necesario).map(d => d.texto);
      return (
        <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
          <BackBtn />
          <div className="card" style={{ padding:'16px', background:'rgba(90,180,90,.06)', border:'2px solid rgba(90,180,90,.35)' }}>
            <p style={{ color:'#7B1B1B', fontSize:'.72rem', letterSpacing:'1.5px', fontWeight:700, margin:'0 0 8px', textTransform:'uppercase' }}>
              ✓ Datos tachados correctamente
            </p>
            {correctos.map((t, i) => (
              <p key={i} style={{ margin:'3px 0', fontSize:'.88rem', color:'#555', textDecoration:'line-through', fontWeight:400 }}>✗ {t}</p>
            ))}
          </div>
          <button className="btn-main" onClick={() => setPhase(2)} style={{ padding:'14px' }}>→ Siguiente paso</button>
        </div>
      );
    }
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
        <BackBtn />
        <StepTachaDatos
          datos={problem.datos}
          hints={problem.hintsLechuza}
          enunciado={problem.enunciado}
          onCorrect={() => { setCompletados(prev => ({...prev, 1:'ok'})); onIngrediente(0); setPhase(2); }}
        />
      </div>
    );
  }

  // ── Phase 2: ¿Qué me preguntan? ──
  if (phase === 2) {
    const necesarios = problem.datos.filter(d => d.necesario);
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
        <BackBtn />
        <div className="card" style={{ padding:'18px', textAlign:'center' }}>
          <p style={{ color:'#7B1B1B', fontSize:'.75rem', letterSpacing:'2px', fontWeight:700, margin:'0 0 10px', textTransform:'uppercase' }}>
            ❓ ¿Qué me preguntan?
          </p>
          <p style={{ color:'#4A2C0A', fontSize:'1.05rem', fontWeight:700, margin:'0 0 14px', lineHeight:1.6 }}>
            {problem.pregunta}
          </p>
          <div style={{ borderTop:'1px solid rgba(196,147,58,.3)', paddingTop:'12px' }}>
            <p style={{ color:'#7B1B1B', fontSize:'.72rem', letterSpacing:'1.5px', fontWeight:700, margin:'0 0 8px', textTransform:'uppercase' }}>
              Datos que necesitas:
            </p>
            {necesarios.map((d, i) => (
              <p key={i} style={{ margin:'3px 0', fontSize:'.85rem', color:'#4A2C0A', fontWeight:600 }}>✓ {d.texto}</p>
            ))}
          </div>
        </div>
        <div style={{ background:'rgba(90,180,90,.08)', border:'1px solid rgba(90,180,90,.3)', borderRadius:'12px', padding:'12px 14px' }}>
          <p style={{ color:'#1A5A2A', fontSize:'.88rem', margin:0, lineHeight:1.5 }}>
            ✓ ¡Bien! Ya sabes qué datos usar.<br/>Ahora piensa cómo resolverlo con esos datos.
          </p>
        </div>
        <button className="btn-main" onClick={() => setPhase(3)} style={{ padding:'14px' }}>Calcular →</button>
      </div>
    );
  }

  // ── Phase 3: Cálculo ──
  if (phase === 3) {
    // Si ya completado: mostrar resultado guardado y avanzar
    if (3 in completados) {
      return (
        <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
          <BackBtn />
          <div className="card" style={{ padding:'16px', textAlign:'center', background:'rgba(90,180,90,.06)', border:'2px solid rgba(90,180,90,.35)' }}>
            <p style={{ color:'#7B1B1B', fontSize:'.72rem', letterSpacing:'1.5px', fontWeight:700, margin:'0 0 6px', textTransform:'uppercase' }}>
              ✓ Cálculo ya resuelto
            </p>
            <p style={{ color:'#4A2C0A', fontSize:'.9rem', margin:'0 0 4px', fontWeight:600 }}>{problem.pregunta}</p>
            <p style={{ color:'#1A5A2A', fontSize:'1.25rem', fontWeight:800, margin:'6px 0 0' }}>
              Resultado: {completados[3]}
            </p>
          </div>
          <button className="btn-main" onClick={() => setPhase(4)} style={{ padding:'14px' }}>→ Ver respuesta final</button>
        </div>
      );
    }
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
        <BackBtn />
        <StepCalcDia11
          key="trampa-calculo"
          pregunta={problem.pregunta}
          resultado={problem.resultado}
          hints={problem.hintsLechuza}
          enunciado={problem.enunciado}
          onCorrect={() => { setCompletados(prev => ({...prev, 3: problem.resultado})); onIngrediente(1); setPhase(4); }}
        />
      </div>
    );
  }

  // ── Phase 4: Respuesta final ──
  if (phase === 4) {
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
        <button className="btn-ghost" onClick={() => setPhase(3)} style={{ width:'100%', fontSize:'.82rem' }}>
          ← Volver al paso anterior
        </button>
        <div className="fb-ok" style={{ flexDirection:'column', alignItems:'flex-start', gap:'8px' }}>
          <span style={{ fontSize:'1.4rem' }}>🏆</span>
          <div>
            <p style={{ margin:'0 0 4px', fontWeight:800, fontSize:'1rem' }}>¡Respuesta final!</p>
            <p style={{ margin:0, lineHeight:1.5 }}>{problem.respuestaFinal}</p>
          </div>
        </div>
        <button className="btn-main" onClick={() => onIngrediente(2)} style={{ padding:'14px' }}>
          ✓ ¡Confirmar respuesta!
        </button>
      </div>
    );
  }

  return null;
}

// Dispatcher principal de Día 11
function StepDia11({ problem, onIngrediente }) {
  if (problem.subtipo === 'encadenado') return <StepDia11Encadenado problem={problem} onIngrediente={onIngrediente} />;
  if (problem.subtipo === 'trampa')     return <StepDia11Trampa     problem={problem} onIngrediente={onIngrediente} />;
  return null;
}

// StepEleccion: renders 2 or 4 choice buttons
function StepEleccion({ problem, onCorrect }) {
  const [chosen, setChosen] = React.useState(null);
  const correct = problem.opcionCorrecta;

  function pick(idx) {
    if (chosen !== null) return;
    setChosen(idx);
    if (idx === correct) {
      setTimeout(onCorrect, 1100);
    }
  }

  const isTwo = problem.subtipo === 'eleccion2';

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'16px' }}>
      <div className="card" style={{ padding:'16px', textAlign:'center' }}>
        <p style={{ color:'#4A2C0A', fontSize:'1rem', margin:0, lineHeight:1.6, fontWeight:700 }}>
          {problem.enunciado}
        </p>
      </div>

      <div style={{ display:'grid', gridTemplateColumns: isTwo ? '1fr 1fr' : '1fr 1fr', gap:'10px' }}>
        {problem.opciones.map((op, i) => {
          const isChosen = chosen === i;
          const isRight  = i === correct;
          let bg = 'linear-gradient(135deg,#FEFBF0,#F5E8BF)';
          let border = '#C4933A';
          let color = '#4A2C0A';
          if (chosen !== null) {
            if (isRight)                   { bg = 'linear-gradient(135deg,#0A2A10,#143A1C)'; border = '#5CB85C'; color = '#A0F0B0'; }
            else if (isChosen && !isRight) { bg = 'linear-gradient(135deg,#2A0A0A,#3A1010)'; border = '#E05050'; color = '#F0A0A0'; }
            else                           { bg = 'rgba(255,255,255,.35)'; border = 'rgba(196,147,58,.25)'; color = '#999'; }
          }
          return (
            <button key={i} onClick={() => pick(i)}
              style={{ background:bg, border:`2px solid ${border}`, borderRadius:'14px',
                padding:'18px 10px', color, fontWeight:800, fontSize: isTwo ? '1rem' : '.9rem',
                cursor: chosen !== null ? 'default' : 'pointer', transition:'all .25s',
                display:'flex', flexDirection:'column', alignItems:'center', gap:'6px',
                boxShadow: isChosen && chosen !== null ? '0 0 18px rgba(90,180,90,.5)' : 'none',
              }}>
              {chosen !== null && isRight && <span style={{ fontSize:'1.4rem' }}>✓</span>}
              {chosen !== null && isChosen && !isRight && <span style={{ fontSize:'1.4rem' }}>✗</span>}
              {op}
            </button>
          );
        })}
      </div>

      {chosen !== null && (
        <div className={`anim-scaleIn ${chosen === correct ? 'fb-ok' : 'fb-err'}`}>
          <span style={{ fontSize:'1.2rem' }}>{chosen === correct ? '🌟' : '💫'}</span>
          <p style={{ margin:0, fontSize:'.9rem' }}>
            {chosen === correct ? '¡Correcto! ' : 'No exactamente. '}
            {problem.explicacion}
          </p>
        </div>
      )}
    </div>
  );
}

// StepCalculo10: lighter numeric input for day 10
function StepCalculo10({ problem, fase, onCorrect }) {
  const [val, setVal] = React.useState('');
  const [status, setStatus] = React.useState('idle'); // idle|correct|wrong
  const [tries, setTries] = React.useState(0);
  const inputRef = React.useRef(null);

  const pr = fase || problem;
  const resultado = pr.resultado;

  React.useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);

  function check() {
    const n = parseInt(val, 10);
    if (n === resultado) {
      setStatus('correct');
      setTimeout(onCorrect, 900);
    } else {
      setTries(t => t + 1);
      setStatus('wrong');
    }
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:'16px' }}>
      <div className="card" style={{ padding:'16px', textAlign:'center' }}>
        <p style={{ color:'#4A2C0A', fontSize:'1rem', margin:'0 0 6px', fontWeight:700, lineHeight:1.5 }}>
          {pr.pregunta || problem.enunciado}
        </p>
        {pr.operacion && (
          <p style={{ color:'#7B1B1B', fontSize:'.85rem', margin:0, opacity:.8 }}>
            Operación: <strong>{pr.operacion}</strong>
          </p>
        )}
      </div>

      <div style={{ background:'rgba(255,255,255,.65)', border:'2px dashed rgba(196,147,58,.55)', borderRadius:'14px', padding:'14px', textAlign:'center' }}>
        <p style={{ color:'#C4933A', fontSize:'.75rem', letterSpacing:'2px', margin:'0 0 4px', fontWeight:700 }}>✏️ MI CÁLCULO EN PAPEL</p>
        <p style={{ color:'#B0A08A', fontSize:'.83rem', margin:0, fontStyle:'italic' }}>Hazlo en papel y escribe el resultado.</p>
      </div>

      <div className="card" style={{ padding:'16px', textAlign:'center' }}>
        <p style={{ color:'#6B4A20', fontSize:'.9rem', margin:'0 0 10px', fontWeight:700 }}>¿Cuál es el resultado?</p>
        <input ref={inputRef} type="number"
          className={`magic-input${status === 'correct' ? ' ok' : status === 'wrong' ? ' err' : ''}`}
          value={val} onChange={e => { setVal(e.target.value); setStatus('idle'); }}
          onKeyDown={e => e.key === 'Enter' && val && status !== 'correct' && check()}
          placeholder="?" disabled={status === 'correct'}
          style={{ width:'100%', maxWidth:'180px', fontSize:'1.8rem', textAlign:'center' }} />
      </div>

      {status === 'correct' && (
        <div className="fb-ok anim-scaleIn">
          <span style={{ fontSize:'1.2rem' }}>🌟</span>
          <p style={{ margin:0 }}>¡Correcto! {pr.operacion} = {resultado}. {pr.explicacion}</p>
        </div>
      )}
      {status === 'wrong' && (
        <>
          <div className="fb-err anim-scaleIn">
            <span style={{ fontSize:'1.2rem' }}>💫</span>
            <p style={{ margin:0 }}>Ese no es. Revisa tu operación en papel.</p>
          </div>
          {tries >= 2 && (
            <div className="fb-hint anim-scaleIn">
              <span style={{ fontSize:'1.1rem' }}>💡</span>
              <p style={{ margin:0, fontSize:'.88rem', fontStyle:'italic' }}>{pr.explicacion}</p>
            </div>
          )}
          <button className="btn-ghost" onClick={() => { setVal(''); setStatus('idle'); }} style={{ width:'100%' }}>🔄 Intentar de nuevo</button>
        </>
      )}
      {status !== 'correct' && (
        <button className="btn-main" onClick={check} disabled={!val.trim()} style={{ padding:'14px' }}>✓ Comprobar</button>
      )}
    </div>
  );
}

// StepDia10: main orchestrator for dia10 problems — handles all subtypes
function StepDia10({ problem, onComplete, onSplash }) {
  const [faseIdx, setFaseIdx] = React.useState(0); // for calculo2

  function handleCorrecta() {
    if (onSplash) onSplash(); // trigger batch ingredient splash
    if (problem.subtipo === 'calculo2') {
      const nextFase = faseIdx + 1;
      if (nextFase < problem.fases.length) {
        setFaseIdx(nextFase);
      } else {
        onComplete();
      }
    } else {
      onComplete();
    }
  }

  if (problem.subtipo === 'eleccion2' || problem.subtipo === 'eleccion4') {
    return <StepEleccion key={problem.id} problem={problem} onCorrect={handleCorrecta} />;
  }
  if (problem.subtipo === 'calculo') {
    return <StepCalculo10 key={problem.id} problem={problem} fase={null} onCorrect={handleCorrecta} />;
  }
  if (problem.subtipo === 'calculo2') {
    const fase = problem.fases[faseIdx];
    return (
      <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
        <div style={{ textAlign:'center' }}>
          <span style={{ background:'#7B1B1B', color:'#fff', fontSize:'.72rem', fontWeight:700, letterSpacing:'1.5px', padding:'4px 12px', borderRadius:'20px' }}>
            PASO {faseIdx + 1} DE {problem.fases.length}
          </span>
        </div>
        <div className="card" style={{ padding:'14px', textAlign:'center' }}>
          <p style={{ color:'#4A2C0A', fontSize:'.95rem', margin:0, fontWeight:700, lineHeight:1.5 }}>{problem.enunciado}</p>
        </div>
        <StepCalculo10 key={`${problem.id}-f${faseIdx}`} problem={problem} fase={fase} onCorrect={handleCorrecta} />
      </div>
    );
  }
  return null;
}

// ═══════════════════════════════════════════════════════
//  SCREEN: PROBLEM
// ═══════════════════════════════════════════════════════

function ProblemScreen({ mission, problemIndex, onComplete, onExit, onPotionComplete }) {
  const [step,    setStep]    = useState(0);
  const [maxStep, setMaxStep] = useState(0);
  const [calcResult, setCalcResult] = useState(null);
  const [done, setDone] = useState(false);
  const problem = mission.problems[problemIndex];

  // Poción mágica (Día 8, 9, 10, 11 y 12)
  const isPocionMision = mission.id === 'dia8' || mission.id === 'dia9' || mission.id === 'dia10' || mission.id === 'dia11' || mission.id === 'dia12';
  const isDia10 = mission.id === 'dia10';
  const isDia11 = mission.id === 'dia11';
  const isDia12 = mission.id === 'dia12';
  const [ingredientes,   setIngredientes]   = useState(new Set());
  const [lastAdded,      setLastAdded]      = useState(null);
  const [splashVisible,  setSplashVisible]  = useState(false);
  const [splashFaseIdx,  setSplashFaseIdx]  = useState(null);
  const splashTimerRef = useRef(null);

  // Día 12: award ingredient (splash only, no navigation); complete after all phases
  function handleDia12Ingrediente(idx) {
    if (ingredientes.has(idx)) return;
    setIngredientes(prev => new Set([...prev, idx]));
    setLastAdded(idx);
    if (splashTimerRef.current) clearTimeout(splashTimerRef.current);
    setSplashFaseIdx(idx);
    setSplashVisible(true);
    splashTimerRef.current = setTimeout(() => setSplashVisible(false), 2800);
  }

  function handleDia12Complete() {
    if (!done) { setDone(true); onPotionComplete && onPotionComplete(problemIndex); onComplete(); }
  }

  // Día 11: award ingredients one by one; last one triggers navigation
  function handleDia11Ingrediente(idx) {
    if (ingredientes.has(idx)) return; // already awarded — no re-award
    setIngredientes(prev => new Set([...prev, idx]));
    setLastAdded(idx);
    if (splashTimerRef.current) clearTimeout(splashTimerRef.current);
    setSplashFaseIdx(idx);
    setSplashVisible(true);
    if (idx === 2) {
      splashTimerRef.current = setTimeout(() => {
        setSplashVisible(false);
        if (!done) { setDone(true); onPotionComplete && onPotionComplete(problemIndex); onComplete(); }
      }, 2200);
    } else {
      splashTimerRef.current = setTimeout(() => setSplashVisible(false), 2800);
    }
  }

  // Día 10: batch-award all 3 ingredients when problem completes
  function handleDia10ProblemComplete() {
    const ings = problem.ingredientes || [];
    setIngredientes(new Set(ings.map((_, i) => i)));
    setLastAdded(0);
    if (splashTimerRef.current) clearTimeout(splashTimerRef.current);
    setSplashFaseIdx(0);
    setSplashVisible(true);
    splashTimerRef.current = setTimeout(() => {
      setSplashVisible(false);
      if (!done) { setDone(true); onPotionComplete && onPotionComplete(problemIndex); onComplete(); }
    }, 2200);
  }

  function handleFaseComplete(faseIdx) {
    if (!isPocionMision) return;
    setIngredientes(prev => {
      if (prev.has(faseIdx)) return prev;
      const next = new Set(prev);
      next.add(faseIdx);
      setLastAdded(faseIdx);
      // Splash
      if (splashTimerRef.current) clearTimeout(splashTimerRef.current);
      setSplashFaseIdx(faseIdx);
      setSplashVisible(true);
      splashTimerRef.current = setTimeout(() => setSplashVisible(false), 2800);
      // Notify parent when all 4 done
      if (next.size === 4 && onPotionComplete) onPotionComplete(problemIndex);
      return next;
    });
  }

  // Advance to next step, tracking furthest reached
  function advance() {
    setStep(s => {
      const next = s + 1;
      setMaxStep(m => Math.max(m, next));
      return next;
    });
  }

  // Go back one step (never below 0)
  function goBack() { setStep(s => Math.max(0, s - 1)); }

  // Guard against double-completion
  function handleComplete() {
    if (!done) { setDone(true); onComplete(); }
  }

  // Shortcut: jump to the furthest step reached
  function jumpToMax() { setStep(maxStep); }

  // Helper: CSS display value for a given step slot
  function show(s) { return { display: step === s ? 'flex' : 'none', flexDirection:'column', gap:'18px' }; }

  // "Skip to where I was" button shown on informational steps when reviewing
  function SkipBtn({ fromStep }) {
    if (maxStep <= fromStep) return null;
    return (
      <button className="btn-ghost" onClick={jumpToMax}
        style={{ width:'100%', justifyContent:'center', padding:'10px', fontSize:'.88rem', borderStyle:'dashed' }}>
        → Continuar donde lo dejé (paso {maxStep + 1})
      </button>
    );
  }

  // ── Día 10 fast-path render ──────────────────────────────
  if (isDia10) {
    return (
      <Wrap>
        <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
          {/* Header */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <button className="btn-ghost" onClick={onExit} style={{ padding:'8px 12px', fontSize:'.8rem' }}>✕ Salir</button>
            <div style={{ textAlign:'center' }}>
              <p className="font-magic" style={{ color:'#C4933A', fontSize:'.65rem', letterSpacing:'2px', margin:0 }}>{mission.titulo}</p>
              <p style={{ color:'#7B1B1B', fontSize:'.9rem', fontWeight:700, margin:'2px 0 0' }}>
                {problem.icono} Problema {problemIndex + 1} de {mission.problems.length}
              </p>
            </div>
            <div style={{ width:'80px' }} />
          </div>
          <div style={{ textAlign:'center' }}>
            <h3 className="font-magic" style={{ color:'#7B1B1B', fontSize:'1.1rem', margin:0 }}>{problem.titulo}</h3>
          </div>
          {/* Mini cauldron progress */}
          <div style={{ display:'flex', justifyContent:'center', gap:'8px', alignItems:'center' }}>
            {(problem.ingredientes || []).map((ing, i) => (
              <div key={i} style={{
                width:'38px', height:'38px', borderRadius:'50%',
                background: ingredientes.has(i) ? `radial-gradient(circle,${ing.color}55,${ing.color}18)` : 'rgba(200,107,222,.1)',
                border: `2px solid ${ingredientes.has(i) ? ing.color : 'rgba(200,107,222,.2)'}`,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize: ingredientes.has(i) ? '1.2rem' : '.95rem',
                filter: ingredientes.has(i) ? 'none' : 'grayscale(1)',
                transition:'all .4s',
              }}>{ingredientes.has(i) ? ing.emoji : '?'}</div>
            ))}
            <span style={{ color:'#7B1B1B', fontSize:'.8rem', marginLeft:'4px' }}>ingredientes</span>
          </div>
          <IngredientSplash visible={splashVisible} faseIdx={0} problemIngredientes={problem.ingredientes} />
          <StepDia10 problem={problem} onComplete={handleDia10ProblemComplete} />
        </div>
      </Wrap>
    );
  }
  // ── End Día 10 fast-path ─────────────────────────────────

  // ── Día 11 fast-path render ──────────────────────────────
  if (isDia11) {
    return (
      <Wrap>
        <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
          {/* Header */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <button className="btn-ghost" onClick={onExit} style={{ padding:'8px 12px', fontSize:'.8rem' }}>✕ Salir</button>
            <div style={{ textAlign:'center' }}>
              <p className="font-magic" style={{ color:'#C4933A', fontSize:'.65rem', letterSpacing:'2px', margin:0 }}>{mission.titulo}</p>
              <p style={{ color:'#7B1B1B', fontSize:'.9rem', fontWeight:700, margin:'2px 0 0' }}>
                {problem.icono} Problema {problemIndex + 1} de {mission.problems.length}
              </p>
            </div>
            <div style={{ width:'80px' }} />
          </div>

          <div style={{ textAlign:'center' }}>
            <h3 className="font-magic" style={{ color:'#7B1B1B', fontSize:'1.1rem', margin:0 }}>{problem.titulo}</h3>
            <span style={{ fontSize:'.72rem', fontWeight:700, letterSpacing:'1.5px', color:'#8B5CF6',
              background:'rgba(139,92,246,.1)', border:'1px solid rgba(139,92,246,.3)',
              borderRadius:'20px', padding:'3px 10px', display:'inline-block', marginTop:'4px' }}>
              {problem.subtipo === 'encadenado' ? '🔗 Encadenado' : '🔍 Con trampa'}
            </span>
          </div>

          {/* Ingredient dots */}
          <div style={{ display:'flex', justifyContent:'center', gap:'8px', alignItems:'center' }}>
            {(problem.ingredientes || []).map((ing, i) => (
              <div key={i} style={{
                width:'38px', height:'38px', borderRadius:'50%',
                background: ingredientes.has(i) ? `radial-gradient(circle,${ing.color}55,${ing.color}18)` : 'rgba(139,92,246,.08)',
                border: `2px solid ${ingredientes.has(i) ? ing.color : 'rgba(139,92,246,.2)'}`,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize: ingredientes.has(i) ? '1.2rem' : '.9rem',
                filter: ingredientes.has(i) ? 'none' : 'grayscale(1)',
                transition:'all .4s',
                title: ing.nombre,
              }}>{ingredientes.has(i) ? ing.emoji : '?'}</div>
            ))}
            <span style={{ color:'rgba(123,27,27,.6)', fontSize:'.78rem', marginLeft:'4px' }}>
              {ingredientes.size}/3 ingredientes
            </span>
          </div>

          <IngredientSplash visible={splashVisible} faseIdx={splashFaseIdx} problemIngredientes={problem.ingredientes} />

          <StepDia11 problem={problem} onIngrediente={handleDia11Ingrediente} />
        </div>
      </Wrap>
    );
  }
  // ── End Día 11 fast-path ─────────────────────────────────

  // ── Día 12 fast-path render ──────────────────────────────
  if (isDia12) {
    return (
      <Wrap>
        <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>
          {/* Header */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <button className="btn-ghost" onClick={onExit} style={{ padding:'8px 12px', fontSize:'.8rem' }}>✕ Salir</button>
            <div style={{ textAlign:'center' }}>
              <p className="font-magic" style={{ color:'#C4933A', fontSize:'.65rem', letterSpacing:'2px', margin:0 }}>{mission.titulo}</p>
              <p style={{ color:'#7B1B1B', fontSize:'.9rem', fontWeight:700, margin:'2px 0 0' }}>
                {problem.icono} Problema {problemIndex + 1} de {mission.problems.length}
              </p>
            </div>
            <div style={{ width:'80px' }} />
          </div>

          <div style={{ textAlign:'center' }}>
            <h3 className="font-magic" style={{ color:'#7B1B1B', fontSize:'1.1rem', margin:0 }}>{problem.titulo}</h3>
            <span style={{ fontSize:'.72rem', fontWeight:700, letterSpacing:'1.5px', color:'#10B981',
              background:'rgba(16,185,129,.1)', border:'1px solid rgba(16,185,129,.35)',
              borderRadius:'20px', padding:'3px 10px', display:'inline-block', marginTop:'4px' }}>
              🪣 Compras mágicas
            </span>
          </div>

          {/* Ingredient dots */}
          <div style={{ display:'flex', justifyContent:'center', gap:'8px', alignItems:'center' }}>
            {(problem.ingredientes || []).map((ing, i) => (
              <div key={i} style={{
                width:'38px', height:'38px', borderRadius:'50%',
                background: ingredientes.has(i) ? `radial-gradient(circle,${ing.color}55,${ing.color}18)` : 'rgba(16,185,129,.08)',
                border: `2px solid ${ingredientes.has(i) ? ing.color : 'rgba(16,185,129,.2)'}`,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize: ingredientes.has(i) ? '1.2rem' : '.9rem',
                filter: ingredientes.has(i) ? 'none' : 'grayscale(1)',
                transition:'all .4s',
              }}>{ingredientes.has(i) ? ing.emoji : '?'}</div>
            ))}
            <span style={{ color:'rgba(123,27,27,.6)', fontSize:'.78rem', marginLeft:'4px' }}>
              {ingredientes.size}/4 ingredientes
            </span>
          </div>

          <IngredientSplash visible={splashVisible} faseIdx={splashFaseIdx} problemIngredientes={problem.ingredientes} />

          <StepDia12 problem={problem} onIngrediente={handleDia12Ingrediente} onComplete={handleDia12Complete} />
        </div>
      </Wrap>
    );
  }
  // ── End Día 12 fast-path ─────────────────────────────────

  return (
    <Wrap>
      <div style={{ display:'flex', flexDirection:'column', gap:'14px' }}>

        {/* Header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ display:'flex', gap:'6px' }}>
            {step > 0 && (
              <button className="btn-ghost" onClick={goBack}
                style={{ padding:'8px 12px', fontSize:'.8rem' }}>← Atrás</button>
            )}
            <button className="btn-ghost" onClick={onExit}
              style={{ padding:'8px 12px', fontSize:'.8rem' }}>✕ Salir</button>
          </div>
          <div style={{ textAlign:'center' }}>
            <p className="font-magic" style={{ color:'#C4933A', fontSize:'.65rem', letterSpacing:'2px', margin:0 }}>
              {mission.titulo}
            </p>
            <p style={{ color:'#7B1B1B', fontSize:'.9rem', fontWeight:700, margin:'2px 0 0' }}>
              {problem.icono} Problema {problemIndex + 1} de {mission.problems.length}
            </p>
          </div>
          <div style={{ width:'80px' }} />
        </div>

        {/* Problem title */}
        <div style={{ textAlign:'center' }}>
          <h3 className="font-magic" style={{ color:'#7B1B1B', fontSize:'1.1rem', margin:0 }}>{problem.titulo}</h3>
        </div>

        {/* Poción Mágica — Día 8 y Día 9 */}
        {isPocionMision && <PotionCauldron ingredientes={ingredientes} lastAdded={lastAdded} problemIngredientes={problem.ingredientes} />}
        {isPocionMision && <IngredientSplash visible={splashVisible} faseIdx={splashFaseIdx} problemIngredientes={problem.ingredientes} />}

        {/* Step progress */}
        <StepProgress step={step} />

        {/* Step label */}
        <div style={{ textAlign:'center' }}>
          <span className="tag">{STEPS_META[step].icon} {STEPS_META[step].label}</span>
        </div>

        {/*
          All step components are always mounted (display:none when not active).
          This preserves their internal state so going back and forward
          does NOT reset already-completed interactive work.
        */}

        {/* STEP 0 — Datos */}
        <div style={show(0)}>
          <StepDatos problem={problem} onNext={advance} />
          <SkipBtn fromStep={0} />
        </div>

        {/* STEP 1 — Pregunta */}
        <div style={show(1)}>
          <StepPregunta problem={problem} onNext={advance} />
          <SkipBtn fromStep={1} />
        </div>

        {/* STEP 2 — Operación */}
        <div style={show(2)}>
          {problem.tipo === 'simple'        && <StepOperacion        problem={problem} onNext={advance} />}
          {problem.tipo === 'dos-paradas'   && <StepOperacionInfo    problem={problem} onNext={advance} />}
          {problem.tipo === 'viaje'         && <StepOperacionInfo    problem={problem} onNext={advance} />}
          {problem.tipo === 'eleccion'      && <StepElegirOperacion  problem={problem} onNext={advance} />}
          {problem.tipo === 'eleccion-dos'  && <StepEleccionDosInfo  problem={problem} onNext={advance} />}
          {problem.tipo === 'eleccion-multi'&& <StepEleccionDosInfo  problem={problem} onNext={advance} />}
          {problem.tipo === 'cadena'        && <StepCadenaInfo       problem={problem} onNext={advance} />}
        </div>

        {/* STEP 3 — Cálculo */}
        <div style={show(3)}>
          {problem.tipo === 'simple'        && <StepCalculo          problem={problem} onNext={advance} onSave={setCalcResult} />}
          {problem.tipo === 'dos-paradas'   && <StepCalculoMultiPaso problem={problem} onNext={advance} onSave={setCalcResult} />}
          {problem.tipo === 'viaje'         && <StepCalculoViaje     problem={problem} onNext={advance} onSave={setCalcResult} />}
          {problem.tipo === 'eleccion'      && <StepCalculoPapelLibre problem={problem} onNext={advance} onSave={setCalcResult} />}
          {problem.tipo === 'eleccion-dos'  && <StepCalculoDosFases      problem={problem} onNext={advance} onSave={setCalcResult} />}
          {problem.tipo === 'eleccion-multi'&& <StepCalculoMultiFases    problem={problem} onNext={advance} onSave={setCalcResult} />}
          {problem.tipo === 'cadena'        && <StepCalculoEncadenado    problem={problem} onNext={advance} onSave={setCalcResult} onFaseComplete={handleFaseComplete} />}
        </div>

        {/* STEP 4 — Respuesta */}
        <div style={show(4)}>
          <StepRespuesta problem={problem} result={calcResult} onComplete={handleComplete} />
        </div>

      </div>
    </Wrap>
  );
}

  const thisPotionDone = isPocionMision && potionCompleted && potionCompleted.has(problemIndex);

  return (
    <Wrap>
      <div className="anim-scaleIn" style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'24px', paddingTop:'24px' }}>

        <div style={{ display:'flex', gap:'14px', fontSize:'1.7rem' }}>
          {['🌟','✨','⭐','✨','🌟'].map((s,i) => (
            <span key={i} className="anim-float" style={{ animationDelay:`${i*.18}s` }}>{s}</span>
          ))}
        </div>

        <div className="card" style={{ padding:'32px 28px', textAlign:'center', width:'100%' }}>
          <div style={{ fontSize:'3.5rem', marginBottom:'14px' }} className="anim-float">{problem.icono}</div>
          <h2 className="font-magic" style={{ color:'#7B1B1B', fontSize:'1.45rem', margin:'0 0 10px' }}>
            ¡Problema {problemIndex + 1} completado!

          <p style={{ color:'#4A2C0A', fontSize:'1rem', margin:'14px 0 0', lineHeight:1.65 }}>{msg}</p>
        </div>

        <div style={{ background:'rgba(26,61,42,.08)', border:'1.5px solid rgba(92,184,92,.5)', borderRadius:'14px', padding:'18px 22px', width:'100%', textAlign:'center' }}>
          <p style={{ color:'#1A3D2A', fontSize:'.85rem', fontWeight:700, margin:'0 0 6px' }}>Tu respuesta:</p>
          <p style={{ color:'#1A3D2A', fontSize:'.95rem', margin:0, fontStyle:'italic' }}>
            "{problem.respuesta_a} <strong>{problem.resultado}</strong> {problem.respuesta_b}"

        </div>

        {/* Mini-poción completada — solo Día 8 */}
        {thisPotionDone && (
          <div className="anim-scaleIn" style={{ background:'linear-gradient(135deg,#1A003A,#2A1050)', border:'2px solid #C86BDE', borderRadius:'16px', padding:'20px 22px', width:'100%', textAlign:'center', color:'#F0D8FF' }}>
            <div style={{ fontSize:'2.5rem', marginBottom:'8px' }}>🧪</div>
            <p style={{ color:'#C86BDE', fontSize:'.68rem', letterSpacing:'2px', fontWeight:700, margin:'0 0 4px' }}>MINI POCIÓN COMPLETADA</p>
            <p style={{ fontSize:'1rem', fontWeight:700, margin:'0 0 10px', color:'#F0D8FF' }}>¡Poción de las Partes Iguales!</p>
            <div style={{ display:'flex', justifyContent:'center', gap:'8px' }}>
              {INGREDIENTES_INFO.map((ing, i) => (
                <div key={i} title={ing.nombre} style={{ width:'32px', height:'32px', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'.9rem', background:`radial-gradient(circle, ${ing.color}44, ${ing.color}18)`, border:`2px solid ${ing.color}` }}>
                  {ing.emoji}
                </div>
              ))}
            </div>
            <p style={{ color:'rgba(200,107,222,.7)', fontSize:'.8rem', margin:'10px 0 0', fontStyle:'italic' }}>Lo has conseguido pensando paso a paso.</p>
          </div>
        )}

        {/* Progress dots */}
        <div style={{ display:'flex', gap:'10px', justifyContent:'center' }}>
          {mission.problems.map((p, i) => (
            <div key={i} style={{
              width:'38px', height:'38px', borderRadius:'50%',
              background: i <= problemIndex ? 'linear-gradient(135deg,#1A3D2A,#245A38)' : 'linear-gradient(135deg,#F5E8C0,#E8D0A0)',
              border: `2px solid ${i <= problemIndex ? '#5CB85C' : '#C4933A'}`,
              display:'flex', alignItems:'center', justifyContent:'center', fontSize:'1.1rem',
            }}>
              {i <= problemIndex ? '✓' : p.icono}

          <button className="btn-main" onClick={onNext} style={{ padding:'18px', background:'linear-gradient(135deg,#1A3D2A,#245A38)', borderColor:'#5CB85C', fontSize:'1.1rem' }}>
            🏆 ¡Ver insignia de misión!
          </button>
        ) : (
          <button className="btn-main" onClick={onNext} style={{ padding:'18px', fontSize:'1.1rem' }}>
            ▶️ Siguiente problema ({problemIndex + 2}/{mission.problems.length})
          </button>
        )}
      </div>
    </Wrap>
  );
}

// ═══════════════════════════════════════════════════════
//  SCREEN: MISSION COMPLETE
// ═══════════════════════════════════════════════════════

function MissionCompleteScreen({ mission, onRepeat, onHome, potionCompleted }) {
  const isPocionMision = mission.id === 'dia8' || mission.id === 'dia9' || mission.id === 'dia10' || mission.id === 'dia11' || mission.id === 'dia12';
  const allPotionsDone = isPocionMision && potionCompleted && potionCompleted.size >= mission.problems.length;

  React.useEffect(() => {
    if (allPotionsDone) {
      try {
        const saved = JSON.parse(localStorage.getItem(LS_POTION_KEY) || '[]');
        if (!saved.includes('partes-iguales')) {
          localStorage.setItem(LS_POTION_KEY, JSON.stringify([...saved, 'partes-iguales']));
        }
      } catch(e) {}
    }
  }, [allPotionsDone]);

  return (
    <Wrap>
      <div className="anim-scaleIn" style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'24px', paddingTop:'18px' }}>

        <div style={{ display:'flex', gap:'12px', fontSize:'1.8rem' }}>
          {['🌟','✨','⭐','✨','🌟'].map((s,i) => (
            <span key={i} className="anim-float" style={{ animationDelay:`${i*.2}s` }}>{s}</span>
          ))}
        </div>

// Confeti muy suave — solo 14 piezas pequeñas
function Confetti() {
  const pieces = Array.from({ length: 14 }, (_, i) => ({
    id: i,
    left: `${6 + i * 6.5}%`,
    color: ['#C4933A','#F5D080','#7B1B1B','#5CB85C','#9B6BE8','#F5E8C0','#E87B3A'][i % 7],
    delay: `${(i * 0.18).toFixed(2)}s`,
    duration: `${2.2 + (i % 4) * 0.4}s`,
    size: i % 3 === 0 ? '10px' : '7px',
  }));
  return (
    <>
      {pieces.map(p => (
        <div key={p.id} className="confetti-piece" style={{
          left: p.left,
          background: p.color,
          width: p.size, height: p.size,
          animationDuration: p.duration,
          animationDelay: p.delay,
        }} />
      ))}
    </>
  );
}

// Tarjeta de cromo — versión grande (recompensa) o pequeña (colección)

  const isLarge = size === 'large';

  if (!unlocked) return (
    <div className="cromo-locked" style={{
      padding: isLarge ? '32px 24px' : '16px 10px',
      textAlign: 'center',
      width: isLarge ? '100%' : '100%',

      <div style={{ fontSize: isLarge ? '3rem' : '1.8rem', filter:'brightness(0)', opacity:.3, marginBottom:'8px' }}>?</div>

        {isLarge ? '— Bloqueado —' : '???'}
      </p>
    </div>
  );

  return (
    <div
      className={`cromo-unlocked${isLarge ? ' anim-glow' : ''}`}
      style={{
        padding: isLarge ? '32px 24px' : '14px 10px',
        textAlign: 'center',

function castleMerlons(x, y, w, n, mh, fill, stroke) {
  const step = w / n;
  return Array.from({ length: n }, (_, i) => (
    <rect key={i}
      x={x + i * step + step * 0.2} y={y}
      width={step * 0.6} height={mh} rx={1.5}
      fill={fill} stroke={stroke} strokeWidth={1} />
  ));
}

  const isB  = (id) => builtSet.has(id);
  const cp   = (id) => CASTLE_PIECES.find(p => p.id === id);

  const bStroke = (id) => isB(id) ? cp(id).accentColor  : '#2A2048';

  const stars = [[18,9],[58,14],[148,6],[228,11],[276,19],[42,30],[265,27],[102,26],[192,8]];

        <rect x="84" y="174" width="132" height="50" rx="3"
          fill={bFill('estacion-magica')} stroke={bStroke('estacion-magica')} strokeWidth={isB('estacion-magica')?2:1}/>
        <rect x="126" y="181" width="48" height="44" rx="24" fill={wFill('estacion-magica')} opacity="0.25"/>
        <rect x="134" y="195" width="32" height="31" rx="16" fill="url(#csky)"/>
        <text x="150" y="196" textAnchor="middle" fontSize="12" opacity={isB('estacion-magica')?1:0.3}>🚂</text>
        {isB('estacion-magica') && <text x="150" y="219" textAnchor="middle" fontSize="6.5" fill={cp('estacion-magica').accentColor} fontWeight="bold">Estación Mágica</text>}
